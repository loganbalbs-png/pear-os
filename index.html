<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 MediaPipe (for real finger tracking) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0b2c6b;
  position:relative;
  overflow:hidden;
  color:white;
}

/* BUBBLES */
.topbar{position:absolute;top:10px;width:100%;height:80px;}
.bubble{
  width:55px;height:55px;border-radius:50%;
  background:#111;display:flex;align-items:center;justify-content:center;
  position:absolute;font-size:12px;
}
.bubble:nth-child(1){left:20px;}
.bubble:nth-child(2){right:20px;}
.bubble:nth-child(3){left:50%;transform:translateX(-50%);top:35px;}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

.grid{text-align:center;margin-top:100px;}
.app{display:inline-block;margin:10px;font-size:11px;}

.icon{
  width:65px;height:65px;border-radius:50%;
  background:#444;display:flex;align-items:center;justify-content:center;
  font-size:24px;
}

.exit{position:absolute;top:10px;right:10px;background:red;padding:5px;}

canvas{position:absolute;top:0;left:0;}
video{width:100%;}
</style>
</head>

<body>

<div class="phone">

<!-- TOP -->
<div class="topbar">
  <div class="bubble" id="time"></div>
  <div class="bubble">🌤</div>
  <div class="bubble">⚙</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid">
<div class="app"><div class="icon" onclick="openApp('finger')">✋</div>Finger</div>
</div>
</div>

<!-- FINGER TRACKING -->
<div id="finger" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="fingerCam" autoplay playsinline></video>
<canvas id="fingerCanvas"></canvas>
</div>

</div>

<script>

/* TIME */
setInterval(()=>time.innerText=new Date().toLocaleTimeString(),1000);

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==="finger"){
    startFinger();
  }
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* ===== REAL FINGER TRACKING ===== */
let canvas=document.getElementById("fingerCanvas");
let ctx=canvas.getContext("2d");
canvas.width=320;
canvas.height=400;

let drawing=false;

const hands=new Hands({
  locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands:1,
  modelComplexity:0,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7
});

hands.onResults(results=>{
  if(!results.multiHandLandmarks.length) return;

  let lm=results.multiHandLandmarks[0];

  let x=lm[8].x*canvas.width;
  let y=lm[8].y*canvas.height;

  let tx=lm[4].x*canvas.width;
  let ty=lm[4].y*canvas.height;

  let dist=Math.hypot(x-tx,y-ty);

  if(dist<40){
    if(!drawing){
      ctx.beginPath();
      ctx.moveTo(x,y);
      drawing=true;
    }else{
      ctx.lineTo(x,y);
      ctx.strokeStyle="lime";
      ctx.lineWidth=3;
      ctx.stroke();
    }
  }else{
    drawing=false;
  }
});

/* CAMERA */
function startFinger(){
  const video=document.getElementById("fingerCam");

  const cam=new Camera(video,{
    onFrame: async ()=>{
      await hands.send({image:video});
    },
    width:320,
    height:400
  });

  cam.start();
}

</script>

</body>
</html>
<script src="upgrade.js"></script>
