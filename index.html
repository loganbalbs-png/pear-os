<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0b2c6b;
  overflow:hidden;
  position:relative;
  color:white;
}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  padding:80px 10px;
  text-align:center;
}

.icon{
  width:60px;height:60px;
  border-radius:15px;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin:auto;
}

.exit{
  position:absolute;
  top:10px;right:10px;
  background:red;padding:5px;
}

video{width:100%;} /* NOT inverted */
canvas{position:absolute;top:0;left:0;}
</style>
</head>

<body>

<div class="phone">

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid">

<div class="icon" onclick="openApp('camera')">📷</div>
<div class="icon" onclick="openApp('photos')">🖼</div>
<div class="icon" onclick="openApp('browser')">🌐</div>
<div class="icon" onclick="openApp('music')">🎵</div>

<div class="icon" onclick="openApp('finger')">✋</div>
<div class="icon" onclick="openApp('notes')">📝</div>
<div class="icon" onclick="openApp('game')">🎮</div>
<div class="icon" onclick="openApp('slap')">💬</div>

</div>
</div>

<!-- MUSIC -->
<div id="music" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<audio id="song" src="https://www.myinstants.com/media/sounds/icarly-theme-song.mp3"></audio>
<button onclick="song.play()">Play</button>
<button onclick="song.pause()">Pause</button>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="c"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery"></div>
</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<input id="search">
<button onclick="frame.src='https://bing.com/search?q='+search.value">Go</button>
<iframe id="frame" style="width:100%;height:80%"></iframe>
</div>

<!-- SLAP -->
<div id="slap" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div>Andre: It actually works now</div>
<div>Cat: Don’t mess it up again</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<h2 id="score">0</h2>
<button onclick="score.innerText++">Tap</button>
</div>

<!-- NOTES -->
<div id="notes" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<textarea style="width:100%;height:80%"></textarea>
</div>

<!-- FINGER -->
<div id="finger" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="fingerCam" autoplay playsinline></video>
<canvas id="fingerCanvas"></canvas>
</div>

</div>

<script>

/* NAV */
function openApp(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id==="camera"){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>cam.srcObject=stream);
}

if(id==="photos") loadPhotos();
if(id==="finger") startFinger();
}

function goHome(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
c.width=cam.videoWidth;
c.height=cam.videoHeight;
c.getContext("2d").drawImage(cam,0,0);

let img=c.toDataURL();
let arr=JSON.parse(localStorage.getItem("photos")||"[]");
arr.push(img);
localStorage.setItem("photos",JSON.stringify(arr));
}

function loadPhotos(){
gallery.innerHTML="";
let arr=JSON.parse(localStorage.getItem("photos")||"[]");
arr.forEach(i=>{
let img=document.createElement("img");
img.src=i;
img.style.width="80px";
gallery.appendChild(img);
});
}

/* ===== FINGER SYSTEM (YOUR EXACT REQUEST) ===== */

let canvas = document.getElementById("fingerCanvas");
let ctx = canvas.getContext("2d");

canvas.width = 320;
canvas.height = 400;

let lastPoint = null;
let lastPinch = false;
let currentColor = "red";

let holdStart = 0;
let holding = false;

const fingerColors = ["yellow","red","green","blue","purple"];

const hands = new Hands({
  locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({maxNumHands:1});

hands.onResults(results => {
  if (!results.multiHandLandmarks.length) {
    lastPoint = null;
    return;
  }

  let lm = results.multiHandLandmarks[0];
  const tips = [4,8,12,16,20];

  let fingersUp = tips.map(i => lm[i].y < lm[i-2].y);

  /* SHOW COLORS ON FINGERS */
  tips.forEach((t,i)=>{
    let fx = lm[t].x * canvas.width;
    let fy = lm[t].y * canvas.height;

    ctx.beginPath();
    ctx.arc(fx,fy,6,0,Math.PI*2);
    ctx.fillStyle=fingerColors[i];
    ctx.fill();
  });

  /* PICK COLOR */
  let count = fingersUp.filter(f=>f).length;
  if(count===1){
    currentColor = fingerColors[fingersUp.findIndex(f=>f)];
  }

  /* PINCH */
  let x = lm[8].x * canvas.width;
  let y = lm[8].y * canvas.height;
  let tx = lm[4].x * canvas.width;
  let ty = lm[4].y * canvas.height;

  let dist = Math.hypot(x-tx,y-ty);
  let pinching = dist < 40;

  if(pinching && !lastPinch){

    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle=currentColor;
    ctx.fill();

    if(lastPoint){
      ctx.beginPath();
      ctx.moveTo(lastPoint.x,lastPoint.y);
      ctx.lineTo(x,y);
      ctx.strokeStyle=currentColor;
      ctx.lineWidth=3;
      ctx.stroke();
    }

    lastPoint = {x,y};
  }

  lastPinch = pinching;

  /* CURSOR */
  ctx.beginPath();
  ctx.arc(x,y,4,0,Math.PI*2);
  ctx.fillStyle=currentColor;
  ctx.fill();

  /* HOLD TO ERASE */
  let palm = lm[0].y;

  if(palm < 0.5){
    if(!holding){
      holdStart = Date.now();
      holding = true;
    }

    if(Date.now() - holdStart > 5000){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      lastPoint=null;
      holding=false;
    }
  } else {
    holding=false;
  }

});

/* START CAMERA */
function startFinger(){
  const cam = new Camera(fingerCam,{
    onFrame: async ()=>await hands.send({image:fingerCam}),
    width:320,
    height:400
  });
  cam.start();
}

/* ===== MARY (BACK) ===== */

function speak(t){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")) speak("What now?");
  else if(text.includes("weather")) speak("Look outside.");
  else if(text.includes("1+1")) speak("It's two.");
};

rec.start();

</script>

</body>
</html>
<script src="upgrade.js"></script>
