<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear OS</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #1a1a1a, #000);
  font-family: Arial;
  display: flex;
  justify-content: center;
}

.phone {
  width: 320px;
  height: 568px;
  border-radius: 60px;
  margin-top: 20px;
  background: radial-gradient(circle at center, #4da6ff, #000);
  box-shadow: inset 0 0 40px rgba(255,255,255,0.2),
              0 20px 40px rgba(0,0,0,0.9);
  padding: 15px;
  position: relative;
  overflow: hidden;
}

/* SCREENS */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}
.active { display: block; }

/* ICONS */
.icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  margin: 8px;
  font-size: 22px;
  color: white;

  box-shadow:
    inset 0 4px 8px rgba(255,255,255,0.5),
    inset 0 -4px 8px rgba(0,0,0,0.6),
    0 6px 12px rgba(0,0,0,0.8);
}

/* ICON COLORS */
.messages { background: linear-gradient(#4cd964, #2ecc71); }
.camera { background: linear-gradient(#444, #111); }
.browser { background: linear-gradient(#1e90ff, #0040ff); }
.photos { background: linear-gradient(#ff2d55, #ff6b81); }
.weather { background: linear-gradient(#5ac8fa, #007aff); }
.notes { background: linear-gradient(#fff176, #fbc02d); color:black; }
.music { background: linear-gradient(#1db954, #0a7d3b); }
.settings { background: linear-gradient(#8e8e93, #4b4b4b); }
.clock { background: linear-gradient(#ffffff, #d1d1d1); color:black; }
.phoneApp { background: linear-gradient(#34c759, #1e7e34); }
.mail { background: linear-gradient(#007aff, #003caa); }

/* GRID */
.grid { text-align: center; }

/* TOP */
.top { text-align:center; }

/* DOCK */
.dock {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
}

/* APP UI */
.topbar {
  background: #007aff;
  color: white;
  padding: 10px;
  text-align: center;
}

.back {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: #007aff;
  color: white;
  padding: 8px;
  border-radius: 10px;
}

/* CAMERA */
video { width: 100%; }

/* BROWSER */
iframe {
  width: 100%;
  height: 85%;
  border: none;
}

</style>
</head>

<body>

<div class="phone">

<!-- HOME -->
<div id="home" class="screen active">

  <div class="top">
    <div class="icon settings">⚙️</div>
    <div class="icon weather">📶</div>
    <div class="icon notes">🔋</div>
  </div>

  <div class="grid">
    <div class="icon messages" onclick="openApp('messages')">💬</div>
    <div class="icon camera" onclick="openApp('camera')">📷</div>
    <div class="icon browser" onclick="openApp('browser')">🌐</div>

    <div class="icon photos" onclick="openApp('photos')">🌸</div>
    <div class="icon weather" onclick="openApp('weather')">☀️</div>
    <div class="icon notes" onclick="openApp('notes')">📝</div>

    <div class="icon music" onclick="openSpotify()">🎵</div>
    <div class="icon settings" onclick="openApp('settings')">⚙️</div>
    <div class="icon clock" onclick="openApp('clock')">🕒</div>
  </div>

  <div class="dock">
    <div class="icon phoneApp" onclick="openApp('phone')">📞</div>
    <div class="icon mail" onclick="openApp('mail')">✉️</div>
    <div class="icon browser" onclick="openApp('browser')">🌐</div>
  </div>

</div>

<!-- MESSAGES -->
<div id="messages" class="screen">
  <div class="topbar">Messages</div>

  <div id="chat" style="padding:10px; height:75%; overflow-y:auto;">
    <div style="background:#007aff;color:white;padding:8px;border-radius:10px;width:fit-content;">Hey 👋</div>
  </div>

  <div style="position:absolute; bottom:50px; width:100%; display:flex;">
    <input id="msgInput" placeholder="Type..."
    style="flex:1; padding:10px; border-radius:20px;">
    <button onclick="sendMessage()">Send</button>
  </div>

  <div class="back" onclick="goHome()">Back</div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
  <div class="topbar">Camera</div>
  <video id="cam" autoplay></video>
  <div class="back" onclick="goHome()">Back</div>
</div>

<!-- BROWSER -->
<div id="browser" class="screen">
  <div class="topbar">Browser</div>
  <iframe src="https://example.com"></iframe>
  <div class="back" onclick="goHome()">Back</div>
</div>

</div>

<script>
function openApp(app) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(app).classList.add('active');

  if(app === "camera") {
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        document.getElementById("cam").srcObject = stream;
      });
  }
}

function goHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById("home").classList.add('active');
}

function sendMessage() {
  let input = document.getElementById("msgInput");
  let chat = document.getElementById("chat");

  if(input.value.trim() !== "") {
    let msg = document.createElement("div");
    msg.style.background = "#34c759";
    msg.style.color = "white";
    msg.style.padding = "8px";
    msg.style.borderRadius = "10px";
    msg.style.margin = "5px";
    msg.style.marginLeft = "auto";
    msg.innerText = input.value;

    chat.appendChild(msg);
    input.value = "";
  }
}

/* OPEN SPOTIFY */
function openSpotify() {
  window.location.href = "https://open.spotify.com";
}
</script>

</body>
</html>
