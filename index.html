<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear OS</title>

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #2d8cff, #5fe1ff);
  font-family: Arial;
  display: flex;
  justify-content: center;
}

.phone {
  width: 320px;
  height: 568px;
  border-radius: 40px;
  margin-top: 40px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 20px;
  position: relative;
}

.cluster {
  background: rgba(255,255,255,0.15);
  border-radius: 50px;
  padding: 20px;
}

.icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: inline-block;
  margin: 10px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}

.green { background: #34c759; }
.blue { background: #007aff; }
.gray { background: #8e8e93; }
.yellow { background: #ffcc00; }
.pink { background: #ff2d55; }

.dock {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
}
</style>
</head>

<body>

<div class="phone">

  <div class="cluster">
    <div class="icon green"></div>
    <div class="icon gray"></div>
    <div class="icon blue"></div>
    <div class="icon yellow"></div>
    <div class="icon pink"></div>
  </div>

  <div class="dock">
    <div class="icon green"></div>
    <div class="icon blue"></div>
    <div class="icon yellow"></div>
  </div>

</div>

</body>
</html>
