<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear OS</title>

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #0a0a0a, #1e90ff);
  font-family: Arial;
  display: flex;
  justify-content: center;
}

.phone {
  width: 320px;
  height: 568px;
  border-radius: 50px;
  margin-top: 20px;
  background: radial-gradient(circle at center, #4da6ff, #0a0a0a);
  padding: 15px;
  position: relative;
  overflow: hidden;
}

/* SCREENS */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}
.active { display: block; }

/* ICONS */
.icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  margin: 8px;
  color: white;
  font-size: 11px;
  font-weight: bold;
  box-shadow: inset 0 3px 6px rgba(255,255,255,0.3),
              0 5px 10px rgba(0,0,0,0.6);
}

/* COLORS */
.green { background: #34c759; }
.blue { background: #007aff; }
.gray { background: #8e8e93; }
.yellow { background: #ffcc00; }
.pink { background: #ff2d55; }
.purple { background: #af52de; }
.cyan { background: #32ade6; }

/* TOP WIDGETS */
.top {
  text-align: center;
  margin-bottom: 10px;
}

/* GRID */
.grid {
  text-align: center;
}

/* DOCK */
.dock {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
}

/* APP SCREENS */
.topbar {
  background: #007aff;
  color: white;
  padding: 10px;
  text-align: center;
}

.back {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: #007aff;
  color: white;
  padding: 8px;
  border-radius: 10px;
}

/* CAMERA */
video { width: 100%; }

/* BROWSER */
iframe {
  width: 100%;
  height: 85%;
  border: none;
}

</style>
</head>

<body>

<div class="phone">

<!-- HOME -->
<div id="home" class="screen active">

  <div id="messages" class="screen">
  <div class="topbar">Messages</div>

  <div id="chat" style="padding:10px; height:75%; overflow-y:auto;">
    <div style="background:#007aff; color:white; padding:8px; border-radius:10px; width:fit-content; margin-bottom:5px;">
      Hey 👋
    </div>
  </div>

  <div style="position:absolute; bottom:50px; width:100%; display:flex;">
    <input id="msgInput" placeholder="Type a message..."
      style="flex:1; padding:10px; border:none; border-radius:20px; margin-left:5px;">
    <button onclick="sendMessage()" 
      style="margin:5px; padding:10px; border:none; border-radius:10px; background:#34c759; color:white;">
      Send
    </button>
  </div>

  <div class="back" onclick="goHome()">Back</div>
</div>

  <div class="grid">
    <div class="icon green" onclick="openApp('messages')">Msg</div>
    <div class="icon gray" onclick="openApp('camera')">Cam</div>
    <div class="icon blue" onclick="openApp('browser')">Web</div>

    <div class="icon pink" onclick="openApp('photos')">Pics</div>
    <div class="icon cyan" onclick="openApp('weather')">Wx</div>
    <div class="icon yellow" onclick="openApp('notes')">Note</div>

    <div class="icon purple" onclick="openApp('music')">Music</div>
    <div class="icon gray" onclick="openApp('settings')">Set</div>
    <div class="icon blue" onclick="openApp('clock')">Clock</div>
  </div>

  <div class="dock">
    <div class="icon green" onclick="openApp('phone')">Call</div>
    <div class="icon blue" onclick="openApp('mail')">Mail</div>
    <div class="icon yellow" onclick="openApp('browser')">Web</div>
  </div>

</div>

<!-- APP SCREENS -->

<div id="messages" class="screen">
  <div class="topbar">Messages</div>
  <p style="padding:20px;">No messages yet 📭</p>
  <div class="back" onclick="goHome()">Back</div>
</div>

<div id="photos" class="screen">
  <div class="topbar">Photos</div>
  <p style="padding:20px;">No photos yet 🖼️</p>
  <div class="back" onclick="goHome()">Back</div>
</div>

<div id="camera" class="screen">
  <div class="topbar">Camera</div>
  <video id="cam" autoplay></video>
  <div class="back" onclick="goHome()">Back</div>
</div>

<div id="browser" class="screen">
  <div class="topbar">Browser</div>
  <iframe src="https://example.com"></iframe>
  <div class="back" onclick="goHome()">Back</div>
</div>

<div id="music" class="screen">
  <div class="topbar">Music</div>
  <p style="padding:20px;">No songs yet 🎵</p>
  <div class="back" onclick="goHome()">Back</div>
</div>

<div id="settings" class="screen">
  <div class="topbar">Settings</div>
  <p style="padding:20px;">Pear OS Settings ⚙️</p>
  <div class="back" onclick="goHome()">Back</div>
</div>

<div id="phone" class="screen">
  <div class="topbar">Phone</div>
  <p style="padding:20px;">Dialer coming soon ☎️</p>
  <div class="back" onclick="goHome()">Back</div>
</div>

<script>
function openApp(app) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(app).classList.add('active');

  if(app === "camera") {
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        document.getElementById("cam").srcObject = stream;
      });
  }
}

function goHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById("home").classList.add('active');
}
</script function sendMessage() {
  let input = document.getElementById("msgInput");
  let chat = document.getElementById("chat");

  if(input.value.trim() !== "") {
    let msg = document.createElement("div");

    msg.style.background = "#34c759";
    msg.style.color = "white";
    msg.style.padding = "8px";
    msg.style.borderRadius = "10px";
    msg.style.marginBottom = "5px";
    msg.style.width = "fit-content";
    msg.style.marginLeft = "auto";

    msg.innerText = input.value;

    chat.appendChild(msg);
    input.value = "";

    chat.scrollTop = chat.scrollHeight;
  }
}>

</div>

</body>
</html>
