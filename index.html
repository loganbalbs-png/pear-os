<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0b2c6b;
  position:relative;
  overflow:hidden;
  color:white;
}

/* TRIANGLE BUBBLES */
.topbar{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.bubble{
  width:70px;
  height:30px;
  background:rgba(0,0,0,0.6);
  border-radius:20px;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:float 3s infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
  100%{transform:translateY(0);}
}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

.grid{
  text-align:center;
  margin-top:80px;
}

.app{
  display:inline-block;
  margin:12px;
  font-size:11px;
}

.icon{
  width:65px;height:65px;
  border-radius:50%;
  position:relative;
  box-shadow:
    inset 0 4px 8px rgba(255,255,255,0.5),
    inset 0 -5px 10px rgba(0,0,0,0.7),
    0 8px 15px rgba(0,0,0,0.9);
}

.icon img{
  width:65%;
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}

.exit{
  position:absolute;
  top:10px;right:10px;
  background:red;padding:5px;
}

/* MARY ORB */
#mary{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:70px;height:70px;
  border-radius:50%;
  background:radial-gradient(circle,orange,red);
  display:none;
  animation:float 2s infinite;
}

/* PEAR BROWSER */
.browserBar{
  background:#111;
  padding:5px;
  display:flex;
}

.browserBar input{
  flex:1;
  padding:5px;
}

/* SLAP STYLE */
.slapHeader{
  background:#003366;
  color:orange;
  padding:10px;
  font-weight:bold;
}

/* VIDEO */
video,canvas{
  width:100%;
}
</style>
</head>

<body>

<div class="phone" id="phone">

<!-- BUBBLES -->
<div class="topbar">
  <div class="bubble">☀️</div>
  <div class="bubble" id="time"></div>
  <div class="bubble" onclick="openApp('settings')">⚙️</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid" id="apps">

<div class="app">
<div class="icon" style="background:#2ecc71" onclick="openApp('messages')"></div>
Messages
</div>

<div class="app">
<div class="icon" style="background:#444" onclick="openApp('camera')"></div>
Camera
</div>

<div class="app">
<div class="icon" style="background:orange" onclick="openApp('browser')"></div>
Pear Brows
</div>

<div class="app">
<div class="icon" style="background:#ffcc00" onclick="openApp('photos')"></div>
Photos
</div>

<div class="app">
<div class="icon" style="background:#3498db" onclick="openApp('store')"></div>
App Store
</div>

<div class="app">
<div class="icon" style="background:#7f8c8d" onclick="openApp('settings')"></div>
Settings
</div>

<div class="app">
<div class="icon" style="background:red" onclick="openApp('slap')"></div>
TheSlap
</div>

</div>
</div>

<!-- SLAP -->
<div id="slap" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<div class="slapHeader">TheSlap</div>
<img src="file_00000000194871f8ac93bd49727af475" style="width:100%">
<img src="file_00000000f4f871fdac1ec70333f368b0" style="width:100%">

</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<h3>Settings</h3>

<button onclick="openApp('customize')">Customize Dynamic Bubble</button>

</div>

<!-- CUSTOMIZE -->
<div id="customize" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<h3>Dynamic Bubble Command</h3>
<input id="cmd" placeholder="type command">
<button onclick="saveCmd()">Save</button>

</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<div class="browserBar">
<input id="search">
<button onclick="goSearch()">Go</button>
</div>

<iframe id="frame" style="width:100%;height:80%"></iframe>

</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸 Photo</button>
<button onclick="startRec()">🎥 Record</button>
<button onclick="stopRec()">Stop</button>

<canvas id="canvas"></canvas>

</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery"></div>
</div>

<!-- STORE -->
<div id="store" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<button onclick="installFlappy()">Install Flappy</button>
</div>

<!-- GAME -->
<div id="flappy" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<canvas id="game" width="300" height="400"></canvas>
</div>

<div id="mary"></div>

</div>

<script>

/* TIME */
setInterval(()=>time.innerText=new Date().toLocaleTimeString(),1000);

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==="camera"){
    navigator.mediaDevices.getUserMedia({video:true,audio:true})
    .then(stream=>{
      cam.srcObject=stream;
      mediaStream=stream;
    });
  }

  if(id==="photos") loadMedia();
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* BROWSER */
function goSearch(){
  frame.src="https://www.bing.com/search?q="+search.value;
}

/* CAMERA PHOTO */
function takePhoto(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);

  let img=canvas.toDataURL();
  saveMedia(img,"img");
}

/* VIDEO */
let recorder, chunks=[], mediaStream;

function startRec(){
  recorder=new MediaRecorder(mediaStream);
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.onstop=e=>{
    let blob=new Blob(chunks);
    let url=URL.createObjectURL(blob);
    saveMedia(url,"video");
    chunks=[];
  };
  recorder.start();
}

function stopRec(){ recorder.stop(); }

/* SAVE MEDIA */
function saveMedia(data,type){
  let arr=JSON.parse(localStorage.getItem("media")||"[]");
  arr.push({data,type});
  localStorage.setItem("media",JSON.stringify(arr));
}

/* LOAD MEDIA */
function loadMedia(){
  gallery.innerHTML="";
  let arr=JSON.parse(localStorage.getItem("media")||"[]");

  arr.forEach(m=>{
    if(m.type==="img"){
      let i=document.createElement("img");
      i.src=m.data;
      i.style.width="80px";
      gallery.appendChild(i);
    }else{
      let v=document.createElement("video");
      v.src=m.data;
      v.controls=true;
      v.style.width="80px";
      gallery.appendChild(v);
    }
  });
}

/* STORE INSTALL */
function installFlappy(){
  let app=document.createElement("div");
  app.className="app";
  app.innerHTML=`
  <div class="icon" style="background:yellow"
  onclick="openApp('flappy')"></div>
  Flappy`;
  apps.appendChild(app);
}

/* GAME (same as before) */
let ctx=game.getContext("2d"),bird,pipes,run;

/* MARY SMART */
const mary=document.getElementById("mary");

function speak(t){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

function reply(input){
  if(input.includes("hello")) return "Hey.";
  if(input.includes("time")) return new Date().toLocaleTimeString();
  return "Yeah I heard you.";
}

/* VOICE */
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")){
    mary.style.display="block";
    speak("Yeah?");
  }else{
    speak(reply(text));
  }
};

rec.start();

/* CUSTOM COMMAND */
function saveCmd(){
  localStorage.setItem("cmd",cmd.value);
}

</script>

</body>
</html>
<script src="upgrade.js"></script>
