<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

/* PHONE */
.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0a2a66;
  overflow:hidden;
  position:relative;
  color:white;
}

/* FLOATING BUBBLES */
.topbar{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-around;
  z-index:5;
}

.bubble{
  width:55px;
  height:55px;
  border-radius:50%;
  background:radial-gradient(circle,#222,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  text-align:center;
  animation:float 3s infinite ease-in-out;
  box-shadow:0 5px 15px rgba(0,0,0,0.8);
}

.bubble:nth-child(2){animation-delay:0.5s;}
.bubble:nth-child(3){animation-delay:1s;}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

/* GRID */
.grid{text-align:center;margin-top:90px;}

.app{display:inline-block;margin:10px;font-size:11px;}

/* PEAR ICONS */
.icon{
  width:65px;
  height:65px;
  border-radius:50%;
  background:radial-gradient(circle at top,#ffffff55,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  box-shadow:inset 0 3px 8px rgba(255,255,255,0.4),
             0 10px 15px rgba(0,0,0,0.9);
}

/* ICON COLORS */
.green{background:radial-gradient(circle,#2ecc71,#145a32);}
.blue{background:radial-gradient(circle,#3498db,#154360);}
.orange{background:radial-gradient(circle,#e67e22,#6e2c00);}
.purple{background:radial-gradient(circle,#9b59b6,#4a235a);}
.gray{background:radial-gradient(circle,#bdc3c7,#424949);}

/* EXIT */
.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  padding:5px;
}

/* MARY */
#mary{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:70px;height:70px;
  border-radius:50%;
  background:radial-gradient(circle,orange,yellow);
  display:none;
  animation:float 2s infinite;
}
</style>
</head>

<body>

<div class="phone" id="phone">

<!-- FLOATING TOP BUBBLES -->
<div class="topbar">
  <div class="bubble">☀️<br>23°</div>
  <div class="bubble" id="time"></div>
  <div class="bubble" onclick="openApp('settings')">⚙️</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid" id="apps">

<div class="app">
<div class="icon green" onclick="openApp('messages')">💬</div>
Messages
</div>

<div class="app">
<div class="icon gray" onclick="openApp('camera')">📷</div>
Camera
</div>

<div class="app">
<div class="icon blue" onclick="openApp('browser')">🌐</div>
Pear Brows
</div>

<div class="app">
<div class="icon orange" onclick="openApp('photos')">🖼️</div>
Photos
</div>

<div class="app">
<div class="icon purple" onclick="openApp('store')">🛍️</div>
Store
</div>

<div class="app">
<div class="icon gray" onclick="openApp('settings')">⚙️</div>
Settings
</div>

</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<h3>Customize</h3>

<button onclick="phone.style.background='#1a4fff'">Blue</button>
<button onclick="phone.style.background='#000'">Black</button>
<button onclick="phone.style.background='#4b0082'">Purple</button>

</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<input id="search" placeholder="Search...">
<button onclick="frame.src='https://www.bing.com/search?q='+search.value">Go</button>
<iframe id="frame" style="width:100%;height:80%"></iframe>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery"></div>
</div>

<!-- STORE -->
<div id="store" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<button onclick="installGame()">Install Game</button>
</div>

<!-- GAME -->
<div id="flappy" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<canvas id="game" width="300" height="400"></canvas>
</div>

<div id="mary"></div>

</div>

<script>

/* TIME */
setInterval(()=>{
  time.innerText=new Date().toLocaleTimeString();
},1000);

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>cam.srcObject=stream);
  }

  if(id==="photos") loadPhotos();
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);

  let img=canvas.toDataURL();
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.push(img);
  localStorage.setItem("photos",JSON.stringify(arr));
}

/* PHOTOS */
function loadPhotos(){
  gallery.innerHTML="";
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.forEach(i=>{
    let img=document.createElement("img");
    img.src=i;
    img.style.width="80px";
    gallery.appendChild(img);
  });
}

/* STORE */
function installGame(){
  let app=document.createElement("div");
  app.className="app";
  app.innerHTML=`
    <div class="icon orange"
    onclick="openApp('flappy'); startGame();">🎮</div>
    Game
  `;
  apps.appendChild(app);
}

/* SIMPLE GAME */
let ctx=document.getElementById("game").getContext("2d");
let bird,pipes,run;

function startGame(){
  bird={x:50,y:150,v:0};
  pipes=[];
  run=true;
  spawn(); loop();
}

function spawn(){
  let top=Math.random()*200;
  pipes.push({x:300,top,bottom:top+120});
  if(run)setTimeout(spawn,1500);
}

function loop(){
  if(!run)return;
  ctx.clearRect(0,0,300,400);

  bird.v+=0.5;
  bird.y+=bird.v;
  ctx.fillRect(bird.x,bird.y,20,20);

  pipes.forEach(p=>{
    p.x-=2;
    ctx.fillRect(p.x,0,30,p.top);
    ctx.fillRect(p.x,p.bottom,30,400);

    if(bird.x<p.x+30 && bird.x+20>p.x &&
       (bird.y<p.top||bird.y+20>p.bottom)){
      run=false;
    }
  });

  requestAnimationFrame(loop);
}

document.addEventListener("click",()=>{if(run)bird.v=-8});

/* MARY */
const mary=document.getElementById("mary");

function speak(t){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

function reply(input){
  if(input.includes("1+1")) return "It's two... how do you not know that?";
  if(input.includes("hi")) return "Hey! I'm Mary.";
  return "I'm still learning.";
}

const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")){
    mary.style.display="block";
    speak("Hi!");
  }else{
    speak(reply(text));
  }
};

rec.start();

</script>

</body>
</html>
