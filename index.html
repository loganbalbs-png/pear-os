<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

/* PHONE */
.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0b2c6b;
  position:relative;
  overflow:hidden;
  color:white;
}

/* 🔥 TRIANGLE CIRCLE BUBBLES */
.topbar{
  position:absolute;
  top:10px;
  width:100%;
  height:80px;
}

.bubble{
  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  animation:float 3s infinite;
}

.topbar .bubble:nth-child(1){
  position:absolute;
  left:20px;
}

.topbar .bubble:nth-child(2){
  position:absolute;
  right:20px;
}

.topbar .bubble:nth-child(3){
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  top:35px;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
  100%{transform:translateY(0);}
}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

.grid{text-align:center;margin-top:100px;}
.app{display:inline-block;margin:12px;font-size:11px;}

.icon{
  width:65px;height:65px;
  border-radius:50%;
  background:#444;
  box-shadow:0 8px 15px rgba(0,0,0,0.9);
}

.exit{
  position:absolute;
  top:10px;right:10px;
  background:red;padding:5px;
}

/* MARY */
#mary{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:70px;height:70px;
  border-radius:50%;
  background:radial-gradient(circle,orange,red);
  display:none;
  animation:float 2s infinite;
}
</style>
</head>

<body>

<div class="phone">

<!-- 🔥 TRIANGLE BUBBLES -->
<div class="topbar">
  <div class="bubble">☀️</div>
  <div class="bubble" id="time"></div>
  <div class="bubble">⚙️</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid">

<div class="app"><div class="icon" onclick="openApp('camera')"></div>Camera</div>
<div class="app"><div class="icon" onclick="openApp('photos')"></div>Photos</div>
<div class="app"><div class="icon" onclick="openApp('browser')"></div>Browser</div>

</div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery"></div>
</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<input id="search">
<button onclick="frame.src='https://bing.com/search?q='+search.value">Go</button>
<iframe id="frame" style="width:100%;height:80%"></iframe>
</div>

<div id="mary"></div>

</div>

<script>

/* TIME */
setInterval(()=>{
  time.innerText=new Date().toLocaleTimeString();
},1000);

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>cam.srcObject=stream);
  }

  if(id==="photos") loadPhotos();
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);

  let img=canvas.toDataURL();
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.push(img);
  localStorage.setItem("photos",JSON.stringify(arr));
}

/* PHOTOS */
function loadPhotos(){
  gallery.innerHTML="";
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.forEach(i=>{
    let img=document.createElement("img");
    img.src=i;
    img.style.width="80px";
    gallery.appendChild(img);
  });
}

/* 🔥 MARY SYSTEM */
const mary=document.getElementById("mary");

function speak(t){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

function fart(){
  new Audio("https://www.myinstants.com/media/sounds/fart.mp3").play();
}

function reply(input){

  input=input.toLowerCase();

  // 🔥 WEATHER INSULT
  if(input.includes("weather")){
    return "I don't know, why don't you stick your head out of the window dumbass.";
  }

  // 🔥 HELLO + FART
  if(input.includes("hello")||input.includes("hi")){
    fart();
    return "Oh... it's you.";
  }

  if(input.includes("time")){
    return "Look at the screen.";
  }

  return "Yeah, I heard you.";
}

/* VOICE */
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")){
    mary.style.display="block";
    speak("Yeah?");
  }else{
    speak(reply(text));
  }
};

rec.start();

</script>

</body>
</html>
<script src="upgrade.js"></script>
