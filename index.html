<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0a2a66;
  position:relative;
  overflow:hidden;
  color:white;
}

/* TOP */
.topbar{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.bubble{
  background:rgba(0,0,0,0.6);
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

/* GRID */
.grid{text-align:center;margin-top:80px;}
.app{display:inline-block;margin:10px;font-size:11px;}

.icon{
  width:65px;height:65px;
  border-radius:50%;
  background-size:cover;
  box-shadow:0 8px 15px rgba(0,0,0,0.9);
}

/* EXIT */
.exit{
  position:absolute;
  top:10px;right:10px;
  background:red;padding:5px;
}

/* MARY */
#mary{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:70px;height:70px;
  border-radius:50%;
  background:radial-gradient(circle,orange,yellow);
  display:none;
  animation:float 2s infinite;
}
@keyframes float{
  50%{transform:translate(-50%,-10px);}
}
</style>
</head>

<body>

<div class="phone" id="phone">

<!-- TOP -->
<div class="topbar">
  <div class="bubble">☀️ 23°</div>
  <div class="bubble" id="time"></div>
  <div class="bubble" onclick="openApp('settings')">Customize</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid" id="apps">

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/2462/2462719.png')" onclick="openApp('messages')"></div>
Messages
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/2920/2920349.png')" onclick="openApp('camera')"></div>
Camera
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/841/841364.png')" onclick="openApp('browser')"></div>
Pear Brows
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/149/149071.png')" onclick="openApp('photos')"></div>
Photos
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')" onclick="openApp('store')"></div>
App Store
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/3524/3524659.png')" onclick="openApp('settings')"></div>
Settings
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/5968/5968756.png')" onclick="openApp('slap')"></div>
Slap
</div>

</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<h3>Settings</h3>
Brightness:
<input type="range" min="0.5" max="1.5" step="0.1"
oninput="document.body.style.filter='brightness('+this.value+')'">

<h4>Customize</h4>
<button onclick="phone.style.background='#1a4fff'">Blue</button>
<button onclick="phone.style.background='#000'">Black</button>
<button onclick="phone.style.background='#4b0082'">Purple</button>

</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<input id="search" placeholder="Search...">
<button onclick="frame.src='https://www.bing.com/search?q='+search.value">Go</button>
<iframe id="frame" style="width:100%;height:80%"></iframe>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery"></div>
</div>

<!-- STORE -->
<div id="store" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<button onclick="installGame()">Install Flappy</button>
</div>

<!-- GAME -->
<div id="flappy" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<canvas id="game" width="300" height="400"></canvas>
</div>

<!-- SLAP -->
<div id="slap" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<h2 style="text-align:center">TheSlap.com</h2>

<div style="padding:10px">
  <div style="background:#222;padding:10px;border-radius:10px;margin-bottom:10px">
    <b>@Tori</b><p>Just performed!! 🎤</p>
  </div>

  <input id="postInput" placeholder="Post something..." style="width:70%">
  <button onclick="postSlap()">Post</button>

  <div id="posts"></div>
</div>
</div>

<div id="mary"></div>

</div>

<script>

/* TIME */
setInterval(()=>{
  time.innerText=new Date().toLocaleTimeString();
},1000);

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>cam.srcObject=stream);
  }

  if(id==="photos") loadPhotos();
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById("home").classList.add('active');
}

/* CAMERA */
function takePhoto(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);

  let img=canvas.toDataURL();
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.push(img);
  localStorage.setItem("photos",JSON.stringify(arr));
}

/* PHOTOS */
function loadPhotos(){
  gallery.innerHTML="";
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.forEach(i=>{
    let img=document.createElement("img");
    img.src=i;
    img.style.width="80px";
    gallery.appendChild(img);
  });
}

/* STORE */
function installGame(){
  let app=document.createElement("div");
  app.className="app";
  app.innerHTML=`<div class="icon" style="background:yellow"
  onclick="openApp('flappy');startGame();"></div>Flappy`;
  apps.appendChild(app);
}

/* GAME */
let ctx=document.getElementById("game").getContext("2d");
let bird,pipes,run;

function startGame(){
  bird={x:50,y:150,v:0};
  pipes=[];
  run=true;
  spawn(); loop();
}

function spawn(){
  let top=Math.random()*200;
  pipes.push({x:300,top,bottom:top+120});
  if(run)setTimeout(spawn,1500);
}

function loop(){
  if(!run)return;

  ctx.clearRect(0,0,300,400);
  bird.v+=0.5; bird.y+=bird.v;
  ctx.fillRect(bird.x,bird.y,20,20);

  pipes.forEach(p=>{
    p.x-=2;
    ctx.fillRect(p.x,0,30,p.top);
    ctx.fillRect(p.x,p.bottom,30,400);

    if(bird.x<p.x+30 && bird.x+20>p.x &&
      (bird.y<p.top||bird.y+20>p.bottom)){
      run=false;
    }
  });

  requestAnimationFrame(loop);
}

document.addEventListener("click",()=>{if(run)bird.v=-8});

/* SLAP */
function postSlap(){
  let text=postInput.value;
  if(!text)return;

  let post=document.createElement("div");
  post.style.background="#333";
  post.style.padding="10px";
  post.style.marginTop="10px";
  post.innerHTML="<b>@You</b><p>"+text+"</p>";

  posts.prepend(post);
  postInput.value="";
}

/* MARY */
const mary=document.getElementById("mary");

function speak(t){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

function reply(input){
  if(input.includes("1+1")) return "It's two… seriously?";
  if(input.includes("time")) return "Look at the screen.";
  if(input.includes("open camera")){openApp("camera");return "Done.";}
  if(input.includes("go home")){goHome();return "You're welcome.";}
  return "I'm not impressed.";
}

const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")){
    mary.style.display="block";
    speak("What?");
  }else{
    speak(reply(text));
  }
};

rec.start();

</script>

</body>
</html>
<script src="upgrade.js"></script>
