<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0a2a66;
  overflow:hidden;
  position:relative;
  color:white;
}

/* TRIANGLE BUBBLES */
.top{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:center;
}

.triangle{
  position:relative;
  width:200px;
  height:80px;
}

.bubble{
  width:50px;
  height:50px;
  border-radius:50%;
  background:radial-gradient(circle,#222,#000);
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  animation:float 3s infinite;
}

.b1{left:0; top:30px;}
.b2{right:0; top:30px;}
.b3{left:75px; top:0;}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

.grid{
  margin-top:100px;
  text-align:center;
}

.app{
  display:inline-block;
  margin:12px;
  font-size:11px;
}

/* ICONS (MORE PEAR STYLE) */
.icon{
  width:65px;
  height:65px;
  border-radius:50%;
  background-size:cover;
  background-position:center;
  box-shadow:0 8px 15px rgba(0,0,0,0.8),
             inset 0 3px 6px rgba(255,255,255,0.4);
}

/* ICON IMAGES */
.msg{background-image:url('https://img.icons8.com/fluency/96/chat.png');}
.cam{background-image:url('https://img.icons8.com/fluency/96/camera.png');}
.music{background-image:url('https://img.icons8.com/fluency/96/musical-notes.png');}
.photos{background-image:url('https://img.icons8.com/fluency/96/picture.png');}
.browser{background-image:url('https://img.icons8.com/fluency/96/internet.png');}
.settings{background-image:url('https://img.icons8.com/fluency/96/settings.png');}

/* EXIT */
.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  padding:6px;
  border-radius:8px;
}

/* MARY */
#mary{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:70px;height:70px;
  border-radius:50%;
  background:radial-gradient(circle,orange,yellow);
  display:none;
  animation:float 2s infinite;
}
</style>
</head>

<body>

<div class="phone" id="phone">

<!-- TRIANGLE BUBBLES -->
<div class="top">
  <div class="triangle">
    <div class="bubble b1">☀️ 23°</div>
    <div class="bubble b2" id="time"></div>
    <div class="bubble b3" onclick="openApp('settings')">⚙️</div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid">

<div class="app">
<div class="icon msg" onclick="openApp('messages')"></div>
Messages
</div>

<div class="app">
<div class="icon cam" onclick="openApp('camera')"></div>
Camera
</div>

<div class="app">
<div class="icon music" onclick="openApp('music')"></div>
PearTunes
</div>

<div class="app">
<div class="icon photos" onclick="openApp('photos')"></div>
Photos
</div>

<div class="app">
<div class="icon browser" onclick="openApp('browser')"></div>
Pear Brows
</div>

<div class="app">
<div class="icon settings" onclick="openApp('settings')"></div>
Settings
</div>

</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<h3>Settings</h3>
</div>

<div id="mary"></div>

</div>

<script>

/* TIME */
setInterval(()=>{
  time.innerText=new Date().toLocaleTimeString();
},1000);

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* 🎤 MARY (SASSY + SMARTER) */

const mary=document.getElementById("mary");

function speak(text){
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

/* FAKE CHATGPT-LIKE LOGIC */
function smartReply(input){

  if(input.includes("time")){
    return "I don't know, why don’t you stick your head out a window or something?";
  }

  if(input.includes("1+1")){
    return "It's two... how do you not know that?";
  }

  if(input.includes("hi") || input.includes("hello")){
    return "Oh great, you're talking to me again. Hi.";
  }

  if(input.includes("who are you")){
    return "I'm Mary. Basically smarter than you, but nicer about it.";
  }

  if(input.includes("go home")){
    goHome();
    return "Relax, I'm taking you home.";
  }

  if(input.includes("open")){
    if(input.includes("camera")) openApp("camera");
    if(input.includes("settings")) openApp("settings");
    return "Done. Try to keep up.";
  }

  /* fallback (chatgpt-like feel) */
  const responses = [
    "That's... interesting. Not in a good way.",
    "I mean, I could answer that, but do I want to?",
    "You're really testing me today.",
    "Let me think... nope, still questionable.",
    "I guess that makes sense... kinda."
  ];

  return responses[Math.floor(Math.random()*responses.length)];
}

/* VOICE */
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")){
    mary.style.display="block";
    speak("What now?");
  }else{
    speak(smartReply(text));
  }
};

rec.start();

</script>

</body>
</html>
