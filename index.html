<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear Phone OS</title>

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  font-family:sans-serif;
}

/* PHONE */
.phone {
  width:320px;
  height:580px;
  border-radius:60px;
  background: radial-gradient(circle,#0a3a66,#000);
  padding:15px;
  position:relative;
  overflow:hidden;
}

/* BRIGHTNESS OVERLAY */
#brightnessOverlay {
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
}

/* LOCK SCREEN */
#lock {
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input {
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

/* SCREENS */
.screen { display:none; position:absolute; width:100%; height:100%; }
.active { display:block; }

/* ICONS */
.icon {
  width:60px;
  height:60px;
  border-radius:50%;
  margin:10px;
  display:inline-block;
  background-size:cover;
  box-shadow: inset 0 5px 10px rgba(255,255,255,0.6),
              inset 0 -5px 10px rgba(0,0,0,0.6),
              0 6px 12px rgba(0,0,0,0.9);
}

/* ICON IMAGES (close to Pear look) */
.msg { background:#5eff8a; }
.cam { background:#777; }
.photos { background:#ff4f7a; }
.maps { background:#ffd400; }
.notes { background:#fff799; }
.weather { background:#4da6ff; }
.music { background:#af52de; }
.settings { background:#aaa; }
.clock { background:#fff; }
.browser { background:#1e90ff; }
.phoneApp { background:#34c759; }
.mail { background:#007aff; }
.mary { background:linear-gradient(red,blue,yellow); }

/* GRID */
.grid { text-align:center; }

/* EXIT */
.exit {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  padding:5px;
}

/* CAMERA */
video, canvas { width:100%; }

/* GALLERY */
.gallery img {
  width:80px;
  margin:5px;
}

/* TOPBAR */
.topbar {
  background:#007aff;
  color:white;
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<div class="phone">

<div id="brightnessOverlay"></div>

<!-- LOCK -->
<div id="lock">
<h2>Enter Passcode</h2>
<input id="pass">
<button onclick="unlock()">Unlock</button>
</div>

<!-- HOME -->
<div id="home" class="screen">
<div class="grid">
<div class="icon msg" onclick="openApp('messages')"></div>
<div class="icon cam" onclick="openApp('camera')"></div>
<div class="icon photos" onclick="openApp('photos')"></div>

<div class="icon maps" onclick="openApp('maps')"></div>
<div class="icon notes" onclick="openApp('notes')"></div>
<div class="icon weather" onclick="openApp('weather')"></div>

<div class="icon music" onclick="openSpotify()"></div>
<div class="icon settings" onclick="openApp('settings')"></div>
<div class="icon clock" onclick="openApp('clock')"></div>

<div class="icon browser" onclick="openApp('browser')"></div>
<div class="icon phoneApp" onclick="openApp('phone')"></div>
<div class="icon mary" onclick="openApp('mary')"></div>
</div>
</div>

<!-- MESSAGES -->
<div id="messages" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Messages</div>
<div id="chat"></div>
<input id="msgInput">
<button onclick="sendMessage()">Send</button>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Camera</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Photos</div>
<div id="gallery" class="gallery"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Settings</div>
<p>Brightness</p>
<input type="range" min="0" max="1" step="0.1" onchange="setBrightness(this.value)">
</div>

<!-- CLOCK -->
<div id="clock" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Clock</div>
<h1 id="time"></h1>
</div>

<!-- PHONE -->
<div id="phone" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Phone</div>
<p>Your number: 555-1234</p>
<input placeholder="Enter number">
<button onclick="alert('Calling...')">Call</button>
</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Browser</div>
<iframe src="https://example.com" style="width:100%;height:80%;"></iframe>
</div>

<!-- NOTES -->
<div id="notes" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Notes</div>
<textarea id="note"></textarea>
<button onclick="saveNote()">Save</button>
</div>

<!-- MAPS -->
<div id="maps" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Maps</div>
<p>Map loading...</p>
</div>

<!-- WEATHER -->
<div id="weather" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Weather</div>
<p>Sunny ☀️ 22°C</p>
</div>

<!-- MARY (SIRI) -->
<div id="mary" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Mary</div>
<button onclick="speak()">Talk</button>
<p id="maryText"></p>
</div>

</div>

<script>
let passcode="1234";

/* LOCK */
function unlock(){
  if(document.getElementById("pass").value===passcode){
    document.getElementById("lock").style.display="none";
    openHome();
  } else alert("Wrong passcode");
}

function openHome(){
document.getElementById("home").classList.add("active");
}

/* NAV */
function openApp(app){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(app).classList.add('active');

if(app==="camera"){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{cam.srcObject=stream;});
}
if(app==="photos") loadPhotos();
}

function goHome(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById("home").classList.add('active');
}

/* CAMERA SAVE */
function takePhoto(){
let c=canvas;
c.width=cam.videoWidth;
c.height=cam.videoHeight;
c.getContext("2d").drawImage(cam,0,0);
let data=c.toDataURL();
let photos=JSON.parse(localStorage.getItem("photos")||"[]");
photos.push(data);
localStorage.setItem("photos",JSON.stringify(photos));
}

/* LOAD PHOTOS */
function loadPhotos(){
let g=document.getElementById("gallery");
g.innerHTML="";
let photos=JSON.parse(localStorage.getItem("photos")||"[]");
photos.forEach(p=>{
let img=document.createElement("img");
img.src=p;
g.appendChild(img);
});
}

/* MESSAGES */
function sendMessage(){
let msg=document.createElement("div");
msg.innerText=msgInput.value;
chat.appendChild(msg);
msgInput.value="";
}

/* NOTES */
function saveNote(){
localStorage.setItem("note",note.value);
}
note.value=localStorage.getItem("note")||"";

/* CLOCK */
setInterval(()=>{
time.innerText=new Date().toLocaleTimeString();
},1000);

/* BRIGHTNESS */
function setBrightness(v){
document.getElementById("brightnessOverlay").style.opacity=v;
}

/* SPOTIFY */
function openSpotify(){
window.location.href="https://open.spotify.com";
}

/* MARY AI */
function speak(){
let text="Hello, I am Mary!";
maryText.innerText=text;
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}
</script>

</body>
</html>
