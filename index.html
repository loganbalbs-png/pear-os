<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear Phone</title>

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  font-family:sans-serif;
}

/* PHONE */
.phone {
  width:320px;
  height:580px;
  border-radius:60px;
  background: radial-gradient(circle,#1a5cff,#000);
  padding:15px;
  position:relative;
  overflow:hidden;
}

/* GRID */
.grid { text-align:center; }

/* APP */
.app {
  display:inline-block;
  margin:8px;
  color:white;
  font-size:12px;
}

/* ICON */
.icon {
  width:60px;
  height:60px;
  border-radius:50%;
  background-size:cover;
  box-shadow:0 6px 12px rgba(0,0,0,0.8);
}

/* ICON IMAGES */
.msg { background:url('https://cdn-icons-png.flaticon.com/512/2462/2462719.png') center/cover; }
.cam { background:url('https://cdn-icons-png.flaticon.com/512/2920/2920222.png') center/cover; }
.photos { background:url('https://cdn-icons-png.flaticon.com/512/149/149852.png') center/cover; }
.browser { background:url('https://cdn-icons-png.flaticon.com/512/888/888879.png') center/cover; }
.settings { background:url('https://cdn-icons-png.flaticon.com/512/3524/3524659.png') center/cover; }
.appstore { background:url('https://cdn-icons-png.flaticon.com/512/731/731985.png') center/cover; }

/* SCREENS */
.screen { display:none; position:absolute; width:100%; height:100%; }
.active { display:block; }

/* EXIT */
.exit {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  padding:5px;
}

/* CAMERA */
video, canvas { width:100%; }

/* PHOTOS */
.gallery img {
  width:80px;
  margin:5px;
}

/* MARY ORB */
#orb {
  position:absolute;
  bottom:-120px;
  left:50%;
  transform:translateX(-50%);
  width:90px;
  height:90px;
  border-radius:50%;
  background: radial-gradient(circle, orange, red);
  box-shadow:0 0 30px orange;
  transition:0.4s;
}

.activeOrb {
  bottom:20px;
  animation:float 2s infinite;
}

@keyframes float {
  0% { transform:translateX(-50%) translateY(0); }
  50% { transform:translateX(-50%) translateY(-10px); }
  100% { transform:translateX(-50%) translateY(0); }
}

#maryText {
  position:absolute;
  bottom:120px;
  width:100%;
  text-align:center;
  color:white;
}
</style>
</head>

<body>

<div class="phone">

<div id="maryText">Say "Hey Mary"</div>
<div id="orb"></div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid" id="apps">

<div class="app"><div class="icon msg" onclick="openApp('messages')"></div>Messages</div>
<div class="app"><div class="icon cam" onclick="openApp('camera')"></div>Camera</div>
<div class="app"><div class="icon photos" onclick="openApp('photos')"></div>Photos</div>

<div class="app"><div class="icon browser" onclick="openBrowser()"></div>Browser</div>
<div class="app"><div class="icon settings" onclick="openApp('settings')"></div>Settings</div>
<div class="app"><div class="icon appstore" onclick="openApp('store')"></div>App Store</div>

</div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery" class="gallery"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<p>Settings</p>
</div>

<!-- APP STORE -->
<div id="store" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<button onclick="installFlappy()">Install Flappy Bird</button>
</div>

<!-- FLAPPY -->
<div id="flappy" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<canvas id="game" width="300" height="400"></canvas>
</div>

</div>

<script>

/* NAV */
function openApp(app){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(app).classList.add('active');

if(app==="camera"){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>cam.srcObject=stream);
}
if(app==="photos") loadPhotos();
}

function goHome(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
canvas.width=cam.videoWidth;
canvas.height=cam.videoHeight;
canvas.getContext("2d").drawImage(cam,0,0);

let data=canvas.toDataURL();
let photos=JSON.parse(localStorage.getItem("photos")||"[]");
photos.push(data);
localStorage.setItem("photos",JSON.stringify(photos));
}

/* PHOTOS */
function loadPhotos(){
gallery.innerHTML="";
let photos=JSON.parse(localStorage.getItem("photos")||"[]");
photos.forEach(p=>{
let img=document.createElement("img");
img.src=p;
gallery.appendChild(img);
});
}

/* BROWSER */
function openBrowser(){
window.open("https://www.google.com","_blank");
}

/* APP STORE */
function installFlappy(){
let app=document.createElement("div");
app.className="app";
app.innerHTML='<div class="icon" style="background:yellow;" onclick="openApp(\'flappy\')"></div>Flappy';
apps.appendChild(app);
}

/* SIMPLE FLAPPY */
let ctx = document.getElementById("game").getContext("2d");
let y=150, v=0;
function loop(){
ctx.clearRect(0,0,300,400);
v+=0.5; y+=v;
ctx.fillRect(50,y,20,20);
requestAnimationFrame(loop);
}
loop();
document.onclick=()=>v=-8;

/* ===== MARY SYSTEM ===== */

function startMary(){
let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;
rec.start();

rec.onresult=e=>{
let t=e.results[e.results.length-1][0].transcript.toLowerCase();
if(t.includes("hey mary")) activateMary();
};

rec.onend=()=>startMary();
}

function activateMary(){
orb.classList.add("activeOrb");
maryText.innerText="Listening...";

let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.start();

rec.onresult=e=>{
respondMary(e.results[0][0].transcript);
};
}

function respondMary(input){
let t=input.toLowerCase();
let reply="I didn’t get that.";

if(t.includes("hello")) reply="Hey!";
else if(t.includes("time")) reply="It’s "+new Date().toLocaleTimeString();
else if(t.includes("open camera")){ reply="Opening camera"; openApp("camera"); }
else if(t.includes("open photos")){ reply="Opening photos"; openApp("photos"); }
else if(t.includes("joke")) reply="Why did the phone cross the road? To get better signal.";

maryText.innerText=reply;
speechSynthesis.speak(new SpeechSynthesisUtterance(reply));

setTimeout(()=>{
orb.classList.remove("activeOrb");
maryText.innerText='Say "Hey Mary"';
},4000);
}

startMary();

</script>

</body>
</html>
