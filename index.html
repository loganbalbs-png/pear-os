<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear Phone OS</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

/* PHONE */
.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background: radial-gradient(circle,#0a2a66,#000);
  overflow:hidden;
  position:relative;
  color:white;
}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

/* APP GRID */
.grid{text-align:center;margin-top:70px;}
.app{display:inline-block;margin:10px;font-size:12px;}

/* PEAR ICON STYLE */
.icon{
  width:65px;height:65px;
  border-radius:50%;
  background-size:cover;
  background-position:center;
  box-shadow:0 8px 16px rgba(0,0,0,0.9);
  border:2px solid rgba(255,255,255,0.2);
}

/* EXIT */
.exit{
  position:absolute;
  top:10px;right:10px;
  background:red;color:white;
  padding:5px;
}

/* MARY */
#mary{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:70px;height:70px;
  border-radius:50%;
  background:radial-gradient(circle,orange,yellow);
  display:none;
  animation:float 2s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translate(-50%,0);}
  50%{transform:translate(-50%,-12px);}
  100%{transform:translate(-50%,0);}
}

.gallery img{width:80px;margin:5px;}
</style>
</head>

<body>

<div class="phone">

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid" id="apps">

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/2462/2462719.png')" onclick="openApp('messages')"></div>
Messages
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/2920/2920349.png')" onclick="openApp('camera')"></div>
Camera
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/841/841364.png')" onclick="openApp('browser')"></div>
Pear Brows
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/149/149071.png')" onclick="openApp('photos')"></div>
Photos
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/1170/1170678.png')" onclick="openApp('store')"></div>
App Store
</div>

<div class="app">
<div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/3524/3524659.png')" onclick="openApp('settings')"></div>
Settings
</div>

</div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸 Take Photo</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery"></div>
</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<input id="search" placeholder="Search..." style="width:90%">
<button onclick="searchWeb()">Search</button>
<iframe id="frame" style="width:100%;height:80%"></iframe>
</div>

<!-- STORE -->
<div id="store" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<h3>App Store</h3>
<button onclick="installFlappy()">Install Flappy Bird</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<h3>Settings</h3>
Brightness:
<input type="range" min="0.5" max="1.5" step="0.1"
oninput="document.body.style.filter='brightness('+this.value+')'">
</div>

<!-- FLAPPY -->
<div id="flappy" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<canvas id="game" width="300" height="400"></canvas>
</div>

<div id="mary"></div>

</div>

<script>

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>cam.srcObject=stream);
  }

  if(id==="photos") loadPhotos();
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);

  let data=canvas.toDataURL();
  let p=JSON.parse(localStorage.getItem("photos")||"[]");
  p.push(data);
  localStorage.setItem("photos",JSON.stringify(p));
}

/* PHOTOS */
function loadPhotos(){
  gallery.innerHTML="";
  let p=JSON.parse(localStorage.getItem("photos")||"[]");
  p.forEach(img=>{
    let i=document.createElement("img");
    i.src=img;
    gallery.appendChild(i);
  });
}

/* BROWSER */
function searchWeb(){
  frame.src="https://www.bing.com/search?q="+search.value;
}

/* STORE */
function installFlappy(){
  let app=document.createElement("div");
  app.className="app";
  app.innerHTML=`
    <div class="icon" style="background:yellow"
    onclick="openApp('flappy'); startGame();"></div>
    Flappy
  `;
  apps.appendChild(app);
}

/* FLAPPY GAME */
let ctx=document.getElementById("game").getContext("2d");
let bird,pipes,run;

function startGame(){
  bird={x:50,y:150,v:0};
  pipes=[];
  run=true;
  spawn(); loop();
}

function spawn(){
  let gap=120;
  let top=Math.random()*200+20;
  pipes.push({x:300,top,bottom:top+gap});
  if(run)setTimeout(spawn,1500);
}

function loop(){
  if(!run)return;
  ctx.clearRect(0,0,300,400);

  bird.v+=0.5;
  bird.y+=bird.v;

  ctx.fillStyle="yellow";
  ctx.fillRect(bird.x,bird.y,20,20);

  pipes.forEach(p=>{
    p.x-=2;
    ctx.fillRect(p.x,0,30,p.top);
    ctx.fillRect(p.x,p.bottom,30,400);

    if(bird.x<p.x+30 && bird.x+20>p.x &&
      (bird.y<p.top||bird.y+20>p.bottom)){
      run=false;
    }
  });

  requestAnimationFrame(loop);
}

document.addEventListener("click",()=>{if(run)bird.v=-8});

/* ===== MARY AI (SMARTER) ===== */

const mary=document.getElementById("mary");

function speak(text){
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function getResponse(input){
  input=input.toLowerCase();

  if(input.includes("hello")||input.includes("hi"))
    return "Hey! I'm Mary, your personal assistant. You can ask me anything.";

  if(input.includes("weather"))
    return "I can't access real-time weather yet, but I can help you check it online using Pear Browser.";

  if(input.includes("who are you"))
    return "I'm Mary, your Pear Phone assistant. I can help with apps, questions, and more.";

  if(input.includes("open camera")){
    openApp("camera");
    return "Opening the camera now.";
  }

  if(input.includes("play game")){
    openApp("flappy");
    startGame();
    return "Launching your game. Good luck!";
  }

  if(input.includes("time"))
    return "The current time is " + new Date().toLocaleTimeString();

  return "That's interesting. I'm still learning, but I think you can find a great answer using Pear Browser.";
}

/* VOICE */
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")){
    mary.style.display="block";
    speak("Hi, how can I help?");
  }else{
    let reply=getResponse(text);
    speak(reply);
  }
};

rec.start();

</script>

</body>
</html>
