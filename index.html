<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:-apple-system;
}

.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  overflow:hidden;
  position:relative;
  background:#0b2c6b;
  color:white;
}

/* LOCK SCREEN */
#lock{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(#0b2c6b,#051533);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.pass{
  display:flex;
  gap:10px;
  margin-top:20px;
}
.dot{
  width:12px;height:12px;border-radius:50%;background:#555;
}
.filled{background:white;}

.keypad button{
  width:60px;height:60px;border-radius:50%;
  margin:5px;
  background:#111;color:white;font-size:20px;
}

/* HOME */
.screen{
  position:absolute;
  width:100%;height:100%;
  display:none;
  transition:0.3s;
}
.active{display:block;}

.grid{
  margin-top:80px;
  text-align:center;
}

/* ICON STYLE (PEAR STYLE) */
.app{
  display:inline-block;
  margin:12px;
  font-size:11px;
}

.icon{
  width:70px;height:70px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #ffffffaa, transparent),
             linear-gradient(#4da6ff,#0044aa);
  box-shadow:0 10px 20px rgba(0,0,0,0.7),
             inset 0 5px 10px rgba(255,255,255,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

/* DIFFERENT ICON COLORS */
.msg{background:linear-gradient(#6fff7a,#00a63c);}
.cam{background:linear-gradient(#ddd,#555);}
.photos{background:linear-gradient(#ff7,#f06);}
.browser{background:linear-gradient(#6cf,#06c);}
.game{background:linear-gradient(#ff9,#f60);}
.settings{background:linear-gradient(#bbb,#333);}
.store{background:linear-gradient(#8cf,#05a);}

/* APP SCREEN */
.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  padding:6px;
}

/* ANIMATION */
.open{
  animation:openApp 0.25s ease;
}
@keyframes openApp{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<div class="phone">

<!-- LOCK SCREEN -->
<div id="lock">
<h2>Enter Passcode</h2>

<div class="pass" id="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="keypad">
<br>
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button><br>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button><br>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button><br>
<button onclick="press(0)">0</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="screen">

<div class="grid" id="apps">

<div class="app">
<div class="icon msg" onclick="openApp('messages')">💬</div>Messages
</div>

<div class="app">
<div class="icon cam" onclick="openApp('camera')">📷</div>Camera
</div>

<div class="app">
<div class="icon photos" onclick="openApp('photos')">🌼</div>Photos
</div>

<div class="app">
<div class="icon browser" onclick="openApp('browser')">🌐</div>PearBrows
</div>

<div class="app">
<div class="icon game" onclick="openApp('game')">🎮</div>Game
</div>

<div class="app">
<div class="icon settings" onclick="openApp('settings')">⚙️</div>Settings
</div>

<div class="app">
<div class="icon store" onclick="openApp('store')">🛍</div>AppStore
</div>

</div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="home()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="snap()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="home()">Exit</div>
<div id="gallery"></div>
</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="home()">Exit</div>
<input id="search"><button onclick="go()">Go</button>
<iframe id="frame" style="width:100%;height:80%"></iframe>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="exit" onclick="home()">Exit</div>
<canvas id="g" width="300" height="400"></canvas>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="home()">Exit</div>
<h3>Settings</h3>
Brightness:
<input type="range" min="0.5" max="1.5" step="0.1" onchange="bright(this.value)">
</div>

<!-- APP STORE -->
<div id="store" class="screen">
<div class="exit" onclick="home()">Exit</div>
<h3>App Store</h3>

<button onclick="install('Notes','📝')">Install Notes</button>
<button onclick="install('Clock','⏰')">Install Clock</button>

</div>

</div>

<script>

/* LOCK */
let code="1234";
let input="";

function press(n){
  input+=n;

  dots.children[input.length-1].classList.add("filled");

  if(input.length===4){
    if(input===code){
      lock.style.display="none";
      homeScreen();
    }else{
      alert("Wrong");
      input="";
      [...dots.children].forEach(d=>d.classList.remove("filled"));
    }
  }
}

/* HOME */
function homeScreen(){
  home.classList.add("active");
}

function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  let app=document.getElementById(id);
  app.classList.add('active','open');

  if(id==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(s=>cam.srcObject=s);
  }

  if(id==="photos") loadPhotos();
}

function home(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* CAMERA */
function snap(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);

  let img=canvas.toDataURL();
  let arr=JSON.parse(localStorage.getItem("p")||"[]");
  arr.push(img);
  localStorage.setItem("p",JSON.stringify(arr));
}

/* PHOTOS */
function loadPhotos(){
  gallery.innerHTML="";
  let arr=JSON.parse(localStorage.getItem("p")||"[]");
  arr.forEach(i=>{
    let img=document.createElement("img");
    img.src=i;
    img.style.width="80px";
    gallery.appendChild(img);
  });
}

/* BROWSER */
function go(){
  frame.src="https://www.bing.com/search?q="+search.value;
}

/* GAME */
let ctx=g.getContext("2d"),y=150,v=0;
function loop(){
  ctx.clearRect(0,0,300,400);
  v+=0.5;y+=v;
  ctx.fillRect(50,y,20,20);
  requestAnimationFrame(loop);
}
loop();
document.onclick=()=>v=-8;

/* SETTINGS */
function bright(v){
  document.body.style.filter=`brightness(${v})`;
}

/* APP STORE */
function install(name,emoji){
  let div=document.createElement("div");
  div.className="app";
  div.innerHTML=`
    <div class="icon">${emoji}</div>${name}
  `;
  apps.appendChild(div);
}

</script>

</body>
</html>
