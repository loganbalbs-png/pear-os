<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0b2c6b;
  overflow:hidden;
  position:relative;
  color:white;
}

/* TOP */
.topbar{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.bubble{
  background:#111;
  padding:8px 12px;
  border-radius:20px;
}

/* SCREENS */
.screen{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
}
.active{display:block;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  padding:80px 10px;
  text-align:center;
}

.app{font-size:11px;}

.icon{
  width:60px;
  height:60px;
  border-radius:15px;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  margin:auto;
}

/* EXIT */
.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  padding:5px;
}

/* CAMERA */
video{width:100%;transform:scaleX(-1);}
canvas{position:absolute;top:0;left:0;}

/* SLAP */
.post{
  background:#222;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="phone">

<div class="topbar">
<div class="bubble" id="time"></div>
<div class="bubble">🌤</div>
<div class="bubble">⚙</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid">

<div class="app"><div class="icon" onclick="openApp('camera')">📷</div>Camera</div>
<div class="app"><div class="icon" onclick="openApp('photos')">🖼</div>Photos</div>
<div class="app"><div class="icon" onclick="openApp('browser')">🌐</div>Browser</div>
<div class="app"><div class="icon" onclick="openApp('finger')">✋</div>Finger</div>

<div class="app"><div class="icon" onclick="openApp('notes')">📝</div>Notes</div>
<div class="app"><div class="icon" onclick="openApp('game')">🎮</div>Game</div>
<div class="app"><div class="icon" onclick="openApp('calc')">🧮</div>Calc</div>
<div class="app"><div class="icon" onclick="openApp('slap')">💬</div>Slap</div>

</div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="c"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery"></div>
</div>

<!-- SLAP -->
<div id="slap" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="post">Andre: This app is actually working 👀</div>
<div class="post">Cat: Why are you even here?</div>
<div class="post">Robbie: Rex says hi 🐸</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<canvas id="gameCanvas" width="300" height="400"></canvas>
</div>

<!-- FINGER -->
<div id="finger" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="fingerCam" autoplay></video>
<canvas id="fingerCanvas"></canvas>
<button onclick="saveDrawing()">Save</button>
</div>

</div>

<script>

/* TIME */
setInterval(()=>time.innerText=new Date().toLocaleTimeString(),1000);

/* NAV */
function openApp(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id==="camera"){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>cam.srcObject=stream);
}

if(id==="photos") loadPhotos();
if(id==="finger") startFinger();
if(id==="game") startGame();
}

function goHome(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
c.width=cam.videoWidth;
c.height=cam.videoHeight;
c.getContext("2d").drawImage(cam,0,0);
let img=c.toDataURL();
let arr=JSON.parse(localStorage.getItem("photos")||"[]");
arr.push(img);
localStorage.setItem("photos",JSON.stringify(arr));
}

/* PHOTOS */
function loadPhotos(){
gallery.innerHTML="";
let arr=JSON.parse(localStorage.getItem("photos")||"[]");
arr.forEach(i=>{
let img=document.createElement("img");
img.src=i;
img.style.width="80px";
img.onclick=()=>window.open(i);
gallery.appendChild(img);
});
}

/* GAME */
let gctx=document.getElementById("gameCanvas").getContext("2d");
let bird=150,vel=0;
function startGame(){
function loop(){
gctx.clearRect(0,0,300,400);
vel+=0.5;
bird+=vel;
gctx.fillRect(100,bird,20,20);
requestAnimationFrame(loop);
}
loop();
}
document.addEventListener("click",()=>vel=-8);

/* FINGER */
let canvas=document.getElementById("fingerCanvas");
let ctx=canvas.getContext("2d");
canvas.width=320;canvas.height=400;

const hands=new Hands({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1});

hands.onResults(r=>{
if(!r.multiHandLandmarks.length) return;
let lm=r.multiHandLandmarks[0];

let x=lm[8].x*canvas.width;
let y=lm[8].y*canvas.height;

ctx.beginPath();
ctx.arc(x,y,5,0,Math.PI*2);
ctx.fillStyle="red";
ctx.fill();
});

function startFinger(){
const cam=new Camera(fingerCam,{
onFrame: async ()=>await hands.send({image:fingerCam}),
width:320,height:400
});
cam.start();
}

function saveDrawing(){
let img=canvas.toDataURL();
let arr=JSON.parse(localStorage.getItem("photos")||"[]");
arr.push(img);
localStorage.setItem("photos",JSON.stringify(arr));
}

</script>

</body>
</html>
<script src="upgrade.js"></script>
