<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

/* PHONE */
.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0a2a66;
  position:relative;
  overflow:hidden;
  color:white;
}

/* TOP BUBBLES */
.topbar{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-around;
  z-index:5;
}

.bubble{
  background:rgba(0,0,0,0.6);
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  animation:float 3s infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
  100%{transform:translateY(0);}
}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

/* SWIPE PAGES */
.pages{
  display:flex;
  width:200%;
  transition:0.4s;
}
.page{
  width:100%;
  flex-shrink:0;
}

/* GRID */
.grid{text-align:center;margin-top:80px;}

.app{display:inline-block;margin:10px;font-size:11px;}

/* PEAR ICON STYLE */
.icon{
  width:65px;height:65px;
  border-radius:50%;
  background-size:cover;
  background-position:center;
  box-shadow:
    inset 0 3px 6px rgba(255,255,255,0.4),
    inset 0 -4px 8px rgba(0,0,0,0.6),
    0 10px 20px rgba(0,0,0,0.9);
}

/* EXIT */
.exit{
  position:absolute;
  top:10px;right:10px;
  background:red;padding:5px;
}

/* MARY */
#mary{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:70px;height:70px;
  border-radius:50%;
  background:radial-gradient(circle,orange,red);
  display:none;
  animation:float 2s infinite;
}
</style>
</head>

<body>

<div class="phone" id="phone">

<!-- TOP -->
<div class="topbar">
  <div class="bubble">☀️ 23°</div>
  <div class="bubble" id="time"></div>
  <div class="bubble" onclick="openApp('settings')">Customize</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="pages" id="pages">

<!-- PAGE 1 -->
<div class="page">
<div class="grid" id="apps">

<div class="app">
<div class="icon" style="background:linear-gradient(green,lightgreen)" onclick="openApp('messages')"></div>
Messages
</div>

<div class="app">
<div class="icon" style="background:radial-gradient(gray,black)" onclick="openApp('camera')"></div>
Camera
</div>

<div class="app">
<div class="icon" style="background:linear-gradient(orange,yellow)" onclick="openApp('browser')"></div>
Pear Brows
</div>

<div class="app">
<div class="icon" style="background:linear-gradient(#ffcc00,#ff6600)" onclick="openApp('photos')"></div>
Photos
</div>

<div class="app">
<div class="icon" style="background:linear-gradient(#0ff,#08f)" onclick="openApp('store')"></div>
App Store
</div>

<div class="app">
<div class="icon" style="background:linear-gradient(gray,black)" onclick="openApp('settings')"></div>
Settings
</div>

<div class="app">
<div class="icon" style="background:linear-gradient(#ff6600,#ff0000)" onclick="openApp('slap')"></div>
TheSlap
</div>

</div>
</div>

<!-- PAGE 2 -->
<div class="page">
<div class="grid">

<div class="app">
<div class="icon" style="background:yellow" onclick="openApp('flappy');startGame();"></div>
Flappy
</div>

</div>
</div>

</div>
</div>

<!-- SLAP APP -->
<div id="slap" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<iframe src="https://www.theslap.com"
style="width:100%;height:90%;border:none;background:#0b2c6b">
</iframe>

</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<h3>Settings</h3>

<p>Brightness</p>
<input type="range" min="0.5" max="1.5" step="0.1"
oninput="document.body.style.filter='brightness('+this.value+')'">

</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<input id="search" placeholder="Search...">
<button onclick="frame.src='https://www.bing.com/search?q='+search.value">Go</button>
<iframe id="frame" style="width:100%;height:80%"></iframe>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery"></div>
</div>

<!-- STORE -->
<div id="store" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<button onclick="installGame()">Install Flappy</button>
</div>

<!-- GAME -->
<div id="flappy" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<canvas id="game" width="300" height="400"></canvas>
</div>

<div id="mary"></div>

</div>

<script>

/* TIME */
setInterval(()=>{
  time.innerText=new Date().toLocaleTimeString();
},1000);

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>cam.srcObject=stream);
  }
}

/* HOME */
function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* SWIPE */
let startX=0;
home.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
home.addEventListener("touchend",e=>{
  let diff=e.changedTouches[0].clientX-startX;
  if(diff<-50) pages.style.transform="translateX(-100%)";
  if(diff>50) pages.style.transform="translateX(0)";
});

/* CAMERA */
function takePhoto(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);
  let img=canvas.toDataURL();
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.push(img);
  localStorage.setItem("photos",JSON.stringify(arr));
}

/* PHOTOS */
function loadPhotos(){
  gallery.innerHTML="";
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.forEach(i=>{
    let img=document.createElement("img");
    img.src=i;
    img.style.width="80px";
    gallery.appendChild(img);
  });
}

/* GAME */
let ctx=game.getContext("2d");
let bird,pipes,run;

function startGame(){
  bird={x:50,y:150,v:0};
  pipes=[];
  run=true;
  spawn(); loop();
}

function spawn(){
  let top=Math.random()*200;
  pipes.push({x:300,top,bottom:top+120});
  if(run)setTimeout(spawn,1500);
}

function loop(){
  if(!run)return;

  ctx.clearRect(0,0,300,400);

  bird.v+=0.5;
  bird.y+=bird.v;

  ctx.fillRect(bird.x,bird.y,20,20);

  pipes.forEach(p=>{
    p.x-=2;
    ctx.fillRect(p.x,0,30,p.top);
    ctx.fillRect(p.x,p.bottom,30,400);

    if(bird.x<p.x+30 && bird.x+20>p.x &&
       (bird.y<p.top||bird.y+20>p.bottom)){
      run=false;
    }
  });

  requestAnimationFrame(loop);
}

document.addEventListener("click",()=>{if(run)bird.v=-8});

/* ===== MARY SMART ===== */
const mary=document.getElementById("mary");

function speak(t){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

function reply(input){

  if(input.includes("1+1"))
    return "It's two... seriously?";

  if(input.includes("time"))
    return "Look at the clock... oh wait fine, it's " + new Date().toLocaleTimeString();

  if(input.includes("hello")||input.includes("hi"))
    return "Hey! What do you want?";

  if(input.includes("weather"))
    return "It's nice... go outside for once.";

  if(input.includes("who are you"))
    return "I'm Mary. Obviously.";

  return "Hmm... I actually understood that. Try something harder.";
}

/* VOICE */
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")){
    mary.style.display="block";
    speak("Yeah?");
  }else{
    speak(reply(text));
  }
};

rec.start();

</script>

</body>
</html>
<script src="upgrade.js"></script>
