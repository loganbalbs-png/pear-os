<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear Phone</title>

<style>
body {
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  font-family:sans-serif;
}

.phone {
  width:320px;
  height:580px;
  border-radius:60px;
  background: radial-gradient(circle,#0a3a66,#000);
  padding:15px;
  position:relative;
  overflow:hidden;
}

/* ICON GRID */
.grid { text-align:center; }

/* ICON + LABEL */
.app {
  display:inline-block;
  margin:8px;
  text-align:center;
  color:white;
  font-size:12px;
}

.icon {
  width:60px;
  height:60px;
  border-radius:50%;
  background-size:cover;
  box-shadow:
    inset 0 5px 10px rgba(255,255,255,0.6),
    inset 0 -5px 10px rgba(0,0,0,0.6),
    0 6px 12px rgba(0,0,0,0.9);
}

/* ICON COLORS (PEAR STYLE) */
.msg { background:#5eff8a; }
.cam { background:#777; }
.photos { background:#ff4f7a; }
.maps { background:#ffd400; }
.notes { background:#fff799; }
.weather { background:#4da6ff; }
.music { background:#af52de; }
.settings { background:#aaa; }
.clock { background:#fff; }
.browser { background:#1e90ff; }
.phoneApp { background:#34c759; }
.appstore { background:#00c7ff; }
.mary { background:linear-gradient(red,blue,yellow); }

/* SCREENS */
.screen { display:none; position:absolute; width:100%; height:100%; }
.active { display:block; }

/* EXIT */
.exit {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  padding:5px;
}

/* TOPBAR */
.topbar {
  background:#007aff;
  color:white;
  text-align:center;
  padding:10px;
}

/* CAMERA */
video, canvas { width:100%; }

/* GALLERY */
.gallery img {
  width:80px;
  margin:5px;
}

/* BRIGHTNESS */
#overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
}

input, textarea { width:90%; margin:10px; padding:10px; }

</style>
</head>

<body>

<div class="phone">

<div id="overlay"></div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid" id="apps">

<div class="app"><div class="icon msg" onclick="openApp('messages')"></div>Messages</div>
<div class="app"><div class="icon cam" onclick="openApp('camera')"></div>Camera</div>
<div class="app"><div class="icon photos" onclick="openApp('photos')"></div>Photos</div>

<div class="app"><div class="icon maps" onclick="openApp('maps')"></div>Maps</div>
<div class="app"><div class="icon notes" onclick="openApp('notes')"></div>Notes</div>
<div class="app"><div class="icon weather" onclick="openApp('weather')"></div>Weather</div>

<div class="app"><div class="icon music" onclick="openSpotify()"></div>PearTunes</div>
<div class="app"><div class="icon settings" onclick="openApp('settings')"></div>Settings</div>
<div class="app"><div class="icon clock" onclick="openApp('clock')"></div>Clock</div>

<div class="app"><div class="icon browser" onclick="openApp('browser')"></div>Browser</div>
<div class="app"><div class="icon phoneApp" onclick="openApp('phone')"></div>Phone</div>
<div class="app"><div class="icon mary" onclick="openApp('mary')"></div>Mary</div>

<div class="app"><div class="icon appstore" onclick="openApp('store')"></div>App Store</div>

</div>
</div>

<!-- MARY (VOICE AI) -->
<div id="mary" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Mary</div>
<button onclick="talk()">🎤 Talk</button>
<p id="maryText"></p>
</div>

<!-- APP STORE -->
<div id="store" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">App Store</div>
<button onclick="installApp('game')">Install Game</button>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Camera</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Photos</div>
<div id="gallery" class="gallery"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Settings</div>

<p>Brightness</p>
<input type="range" min="0" max="1" step="0.1" onchange="setBrightness(this.value)">

<p>Change Passcode</p>
<input id="newPass">
<button onclick="changePass()">Save</button>

</div>

</div>

<script>
let passcode="1234";

/* NAV */
function openApp(app){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(app).classList.add('active');

if(app==="camera"){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>cam.srcObject=stream);
}
if(app==="photos") loadPhotos();
}

function goHome(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
canvas.width=cam.videoWidth;
canvas.height=cam.videoHeight;
canvas.getContext("2d").drawImage(cam,0,0);

let data=canvas.toDataURL();
let photos=JSON.parse(localStorage.getItem("photos")||"[]");
photos.push(data);
localStorage.setItem("photos",JSON.stringify(photos));
}

function loadPhotos(){
gallery.innerHTML="";
let photos=JSON.parse(localStorage.getItem("photos")||"[]");
photos.forEach(p=>{
let img=document.createElement("img");
img.src=p;
gallery.appendChild(img);
});
}

/* BRIGHTNESS */
function setBrightness(v){
overlay.style.opacity=v;
}

/* PASSCODE */
function changePass(){
passcode=document.getElementById("newPass").value;
alert("Passcode updated");
}

/* SPOTIFY */
function openSpotify(){
window.location.href="https://open.spotify.com";
}

/* APP STORE */
function installApp(name){
let div=document.createElement("div");
div.className="app";
div.innerHTML='<div class="icon" style="background:orange;"></div>'+name;
apps.appendChild(div);
}

/* MARY VOICE */
function talk(){
let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.start();

recognition.onresult = function(e){
let text = e.results[0][0].transcript;
maryText.innerText = "You: " + text;

let response = "I heard you say " + text;
speechSynthesis.speak(new SpeechSynthesisUtterance(response));
};
}
</script>

</body>
</html>
