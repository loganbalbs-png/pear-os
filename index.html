<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear OS</title>

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #2d8cff, #5fe1ff);
  font-family: Arial;
  display: flex;
  justify-content: center;
}

.phone {
  width: 320px;
  height: 568px;
  border-radius: 40px;
  margin-top: 30px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  overflow: hidden;
  position: relative;
}

/* SCREENS */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}

.active {
  display: block;
}

/* HOME */
.home {
  padding: 15px;
}

.icon {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  display: inline-block;
  margin: 10px;
  text-align: center;
  line-height: 65px;
  color: white;
  font-size: 12px;
  font-weight: bold;
}

.green { background: #34c759; }
.blue { background: #007aff; }
.gray { background: #8e8e93; }
.yellow { background: #ffcc00; }
.pink { background: #ff2d55; }
.purple { background: #af52de; }

/* TOP BAR */
.topbar {
  background: #007aff;
  color: white;
  padding: 10px;
  text-align: center;
  font-weight: bold;
}

/* BACK BUTTON */
.back {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: #007aff;
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
}

/* CAMERA */
video {
  width: 100%;
  height: auto;
}

/* BROWSER */
iframe {
  width: 100%;
  height: 90%;
  border: none;
}

</style>
</head>

<body>

<div class="phone">

<!-- HOME SCREEN -->
<div id="home" class="screen active home">

  <div class="icon green" onclick="openApp('messages')">Msg</div>
  <div class="icon gray" onclick="openApp('camera')">Cam</div>
  <div class="icon blue" onclick="openApp('browser')">Web</div>
  <div class="icon yellow" onclick="openApp('photos')">Pics</div>
  <div class="icon pink" onclick="openApp('music')">Music</div>

</div>

<!-- MESSAGES -->
<div id="messages" class="screen">
  <div class="topbar">Messages</div>
  <p style="padding:20px;">No messages yet 📭</p>
  <div class="back" onclick="goHome()">Back</div>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
  <div class="topbar">Photos</div>
  <p style="padding:20px;">No photos yet 🖼️</p>
  <div class="back" onclick="goHome()">Back</div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
  <div class="topbar">Camera</div>
  <video id="cam" autoplay></video>
  <div class="back" onclick="goHome()">Back</div>
</div>

<!-- BROWSER -->
<div id="browser" class="screen">
  <div class="topbar">Browser</div>
  <iframe src="https://example.com"></iframe>
  <div class="back" onclick="goHome()">Back</div>
</div>

<!-- MUSIC -->
<div id="music" class="screen">
  <div class="topbar">Music</div>
  <p style="padding:20px;">No songs yet 🎵</p>
  <div class="back" onclick="goHome()">Back</div>
</div>

</div>

<script>
function openApp(app) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(app).classList.add('active');

  if(app === "camera") {
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        document.getElementById("cam").srcObject = stream;
      });
  }
}

function goHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById("home").classList.add('active');
}
</script>

</body>
</html>
