<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear Phone</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

/* PHONE BODY */
.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background: radial-gradient(circle at top,#2c3e50,#000);
  padding:15px;
  box-shadow:0 0 40px rgba(0,0,0,0.9);
  position:relative;
  overflow:hidden;
}

/* HOME GRID */
.grid{
  text-align:center;
  margin-top:80px;
}

.app{
  display:inline-block;
  margin:10px;
  color:white;
  font-size:12px;
}

/* ICON STYLE */
.icon{
  width:65px;
  height:65px;
  border-radius:50%;
  background-size:cover;
  background-position:center;
  box-shadow: inset 0 3px 8px rgba(255,255,255,0.3),
              0 8px 15px rgba(0,0,0,0.8);
}

/* TOP WIDGET */
.top{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  font-size:14px;
}

/* DOCK */
.dock{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
}

.dock .icon{
  width:60px;
  height:60px;
}

/* SCREENS */
.screen{
  display:none;
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
}

.active{ display:block; }

.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  padding:5px;
}

/* CAMERA */
video, canvas{
  width:100%;
}

/* PHOTOS */
.gallery img{
  width:80px;
  margin:5px;
}
</style>
</head>

<body>

<div class="phone">

<div class="top">9:41 AM</div>

<!-- HOME -->
<div id="home" class="screen active">

<div class="grid" id="apps">

<!-- ROW 1 -->
<div class="app">
<div class="icon" style="background:#2ecc71" onclick="openApp('messages')"></div>
Messages
</div>

<div class="app">
<div class="icon" style="background:#7f8c8d" onclick="openApp('camera')"></div>
Camera
</div>

<!-- ROW 2 -->
<div class="app">
<div class="icon" style="background:#3498db"></div>
FaceTime
</div>

<div class="app">
<div class="icon" style="background:#2980b9"></div>
Stocks
</div>

<div class="app">
<div class="icon" style="background:#f1c40f"></div>
Maps
</div>

<!-- ROW 3 -->
<div class="app">
<div class="icon" style="background:#e67e22" onclick="openApp('photos')"></div>
Photos
</div>

<div class="app">
<div class="icon" style="background:#1abc9c"></div>
Weather
</div>

<div class="app">
<div class="icon" style="background:#ecf0f1"></div>
Notes
</div>

<!-- ROW 4 -->
<div class="app">
<div class="icon" style="background:#9b59b6"></div>
Music
</div>

<div class="app">
<div class="icon" style="background:#34495e" onclick="openApp('settings')"></div>
Settings
</div>

<div class="app">
<div class="icon" style="background:#ffffff"></div>
Clock
</div>

<div class="app">
<div class="icon" style="background:#16a085"></div>
Videos
</div>

</div>

<!-- DOCK -->
<div class="dock">

<div class="app">
<div class="icon" style="background:#2ecc71"></div>
Phone
</div>

<div class="app">
<div class="icon" style="background:#3498db"></div>
Mail
</div>

<div class="app">
<div class="icon" style="background:#2980b9" onclick="openBrowser()"></div>
Safari
</div>

<div class="app">
<div class="icon" style="background:#f39c12"></div>
Lock
</div>

</div>

</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery" class="gallery"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<h3 style="color:white">Settings</h3>
<input type="range" min="0.5" max="1.5" step="0.1" value="1"
oninput="document.body.style.zoom=this.value">
</div>

<!-- FLAPPY -->
<div id="flappy" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<canvas id="game" width="300" height="400"></canvas>
</div>

</div>

<script>

/* NAV */
function openApp(app){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(app).classList.add('active');

  if(app==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>cam.srcObject=stream);
  }

  if(app==="photos") loadPhotos();
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);

  let data=canvas.toDataURL();
  let photos=JSON.parse(localStorage.getItem("photos")||"[]");
  photos.push(data);
  localStorage.setItem("photos",JSON.stringify(photos));
}

/* PHOTOS */
function loadPhotos(){
  gallery.innerHTML="";
  let photos=JSON.parse(localStorage.getItem("photos")||"[]");
  photos.forEach(p=>{
    let img=document.createElement("img");
    img.src=p;
    gallery.appendChild(img);
  });
}

/* BROWSER */
function openBrowser(){
  window.open("https://www.google.com","_blank");
}

</script>

</body>
</html>
