<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

/* PHONE */
.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0a2a66;
  position:relative;
  overflow:hidden;
  color:white;
}

/* 🔺 TRIANGLE BUBBLES */
.top{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:center;
}

.triangle{
  position:relative;
  width:200px;
  height:80px;
}

.bubble{
  width:50px;
  height:50px;
  border-radius:50%;
  background:radial-gradient(circle,#222,#000);
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  animation:float 3s infinite;
}

/* triangle positions */
.b1{left:0; top:30px;}
.b2{right:0; top:30px;}
.b3{left:75px; top:0;}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

/* GRID */
.grid{
  margin-top:100px;
  text-align:center;
}

/* APP */
.app{
  display:inline-block;
  margin:12px;
  font-size:11px;
}

/* REALISTIC ICONS */
.icon{
  width:65px;
  height:65px;
  border-radius:50%;
  background-size:cover;
  background-position:center;
  box-shadow:0 8px 15px rgba(0,0,0,0.8),
             inset 0 3px 6px rgba(255,255,255,0.4);
}

/* ICON IMAGES */
.msg{background-image:url('https://cdn-icons-png.flaticon.com/512/2462/2462719.png');}
.cam{background-image:url('https://cdn-icons-png.flaticon.com/512/685/685655.png');}
.music{background-image:url('https://cdn-icons-png.flaticon.com/512/727/727269.png');}
.photos{background-image:url('https://cdn-icons-png.flaticon.com/512/1829/1829586.png');}
.browser{background-image:url('https://cdn-icons-png.flaticon.com/512/841/841364.png');}
.settings{background-image:url('https://cdn-icons-png.flaticon.com/512/3524/3524659.png');}

/* EXIT */
.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  padding:6px;
  border-radius:8px;
}

/* MARY */
#mary{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:70px;height:70px;
  border-radius:50%;
  background:radial-gradient(circle,orange,yellow);
  display:none;
  animation:float 2s infinite;
}
</style>
</head>

<body>

<div class="phone" id="phone">

<!-- 🔺 TRIANGLE BUBBLES -->
<div class="top">
  <div class="triangle">
    <div class="bubble b1">☀️ 23°</div>
    <div class="bubble b2" id="time"></div>
    <div class="bubble b3" onclick="openApp('settings')">⚙️</div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid">

<div class="app">
<div class="icon msg" onclick="openApp('messages')"></div>
Messages
</div>

<div class="app">
<div class="icon cam" onclick="openApp('camera')"></div>
Camera
</div>

<div class="app">
<div class="icon music" onclick="openApp('music')"></div>
PearTunes
</div>

<div class="app">
<div class="icon photos" onclick="openApp('photos')"></div>
Photos
</div>

<div class="app">
<div class="icon browser" onclick="openApp('browser')"></div>
Pear Brows
</div>

<div class="app">
<div class="icon settings" onclick="openApp('settings')"></div>
Settings
</div>

</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<h3>Settings</h3>

<button onclick="phone.style.background='#000'">Black</button>
<button onclick="phone.style.background='#1a4fff'">Blue</button>

</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<input id="search" placeholder="Search...">
<button onclick="frame.src='https://www.bing.com/search?q='+search.value">Go</button>
<iframe id="frame" style="width:100%;height:80%"></iframe>

</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery"></div>
</div>

<!-- MUSIC -->
<div id="music" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<h3>PearTunes</h3>
<p>Music player coming soon 🎵</p>
</div>

<div id="mary"></div>

</div>

<script>

/* TIME */
setInterval(()=>{
  time.innerText=new Date().toLocaleTimeString();
},1000);

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>cam.srcObject=stream);
  }

  if(id==="photos") loadPhotos();
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);

  let img=canvas.toDataURL();
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.push(img);
  localStorage.setItem("photos",JSON.stringify(arr));
}

/* PHOTOS */
function loadPhotos(){
  gallery.innerHTML="";
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.forEach(i=>{
    let img=document.createElement("img");
    img.src=i;
    img.style.width="80px";
    gallery.appendChild(img);
  });
}

/* 🎤 MARY */
const mary=document.getElementById("mary");

function speak(t){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

function reply(input){
  if(input.includes("1+1")) return "It's two... how do you not know that?";
  if(input.includes("go home")) { goHome(); return "Going home."; }
  if(input.includes("hi")) return "Hey! I'm Mary.";
  return "I'm still learning.";
}

const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")){
    mary.style.display="block";
    speak("Hi!");
  }else{
    speak(reply(text));
  }
};

rec.start();

</script>

</body>
</html>
