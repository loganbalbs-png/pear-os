<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

/* PHONE */
.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0b2c6b;
  position:relative;
  overflow:hidden;
  color:white;
}

/* TOP BUBBLES */
.topbar{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.bubble{
  background:rgba(0,0,0,0.6);
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

/* GRID */
.grid{
  text-align:center;
  margin-top:80px;
}

.app{
  display:inline-block;
  margin:12px;
  font-size:11px;
}

/* REAL PEAR ICON STYLE */
.icon{
  width:65px;height:65px;
  border-radius:50%;
  position:relative;
  box-shadow:
    inset 0 4px 8px rgba(255,255,255,0.5),
    inset 0 -5px 10px rgba(0,0,0,0.7),
    0 8px 15px rgba(0,0,0,0.9);
}

/* ICON INNER IMAGE */
.icon img{
  width:70%;
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}

/* EXIT */
.exit{
  position:absolute;
  top:10px;right:10px;
  background:red;padding:5px;
}

/* MARY */
#mary{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:70px;height:70px;
  border-radius:50%;
  background:radial-gradient(circle,orange,red);
  display:none;
}
</style>
</head>

<body>

<div class="phone" id="phone">

<!-- TOP -->
<div class="topbar">
  <div class="bubble">☀️ 23°</div>
  <div class="bubble" id="time"></div>
  <div class="bubble" onclick="openApp('settings')">Settings</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid">

<!-- MESSAGES -->
<div class="app">
<div class="icon" style="background:#2ecc71" onclick="openApp('messages')">
<img src="https://img.icons8.com/ios-filled/100/ffffff/speech-bubble.png">
</div>
Messages
</div>

<!-- CAMERA -->
<div class="app">
<div class="icon" style="background:#444" onclick="openApp('camera')">
<img src="https://img.icons8.com/ios-filled/100/ffffff/camera.png">
</div>
Camera
</div>

<!-- BROWSER -->
<div class="app">
<div class="icon" style="background:#f39c12" onclick="openApp('browser')">
<img src="https://img.icons8.com/ios-filled/100/ffffff/globe.png">
</div>
Pear Brows
</div>

<!-- PHOTOS -->
<div class="app">
<div class="icon" style="background:#ffcc00" onclick="openApp('photos')">
<img src="https://img.icons8.com/ios-filled/100/ffffff/picture.png">
</div>
Photos
</div>

<!-- APP STORE -->
<div class="app">
<div class="icon" style="background:#3498db" onclick="openApp('store')">
<img src="https://img.icons8.com/ios-filled/100/ffffff/shopping-bag.png">
</div>
App Store
</div>

<!-- SETTINGS -->
<div class="app">
<div class="icon" style="background:#7f8c8d" onclick="openApp('settings')">
<img src="https://img.icons8.com/ios-filled/100/ffffff/settings.png">
</div>
Settings
</div>

<!-- SLAP -->
<div class="app">
<div class="icon" style="background:#e74c3c" onclick="openApp('slap')">
<img src="https://img.icons8.com/ios-filled/100/ffffff/tv.png">
</div>
TheSlap
</div>

</div>
</div>

<!-- SLAP APP -->
<div id="slap" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<div style="padding:10px">
<h2 style="color:orange">TheSlap</h2>
<p>Welcome to TheSlap!</p>
<p>Watch videos, see posts, and explore.</p>
<button onclick="alert('Video playing...')">▶ Play Video</button>
</div>

</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>

<h3>Settings</h3>
<p>Brightness</p>
<input type="range" min="0.5" max="1.5" step="0.1"
oninput="document.body.style.filter='brightness('+this.value+')'">

</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<input id="search" placeholder="Search...">
<button onclick="frame.src='https://www.bing.com/search?q='+search.value">Go</button>
<iframe id="frame" style="width:100%;height:80%"></iframe>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery"></div>
</div>

<!-- STORE -->
<div id="store" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<button onclick="installGame()">Install Flappy</button>
</div>

<!-- GAME -->
<div id="flappy" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<canvas id="game" width="300" height="400"></canvas>
</div>

<div id="mary"></div>

</div>

<script>

/* TIME */
setInterval(()=>{
  time.innerText=new Date().toLocaleTimeString();
},1000);

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>cam.srcObject=stream);
  }

  if(id==="photos") loadPhotos();
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);
  let img=canvas.toDataURL();
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.push(img);
  localStorage.setItem("photos",JSON.stringify(arr));
}

/* PHOTOS */
function loadPhotos(){
  gallery.innerHTML="";
  let arr=JSON.parse(localStorage.getItem("photos")||"[]");
  arr.forEach(i=>{
    let img=document.createElement("img");
    img.src=i;
    img.style.width="80px";
    gallery.appendChild(img);
  });
}

/* STORE */
function installGame(){
  openApp('flappy');
  startGame();
}

/* GAME */
let ctx=game.getContext("2d");
let bird,pipes,run;

function startGame(){
  bird={x:50,y:150,v:0};
  pipes=[];
  run=true;
  spawn(); loop();
}

function spawn(){
  let top=Math.random()*200;
  pipes.push({x:300,top,bottom:top+120});
  if(run)setTimeout(spawn,1500);
}

function loop(){
  if(!run)return;

  ctx.clearRect(0,0,300,400);
  bird.v+=0.5;
  bird.y+=bird.v;
  ctx.fillRect(bird.x,bird.y,20,20);

  pipes.forEach(p=>{
    p.x-=2;
    ctx.fillRect(p.x,0,30,p.top);
    ctx.fillRect(p.x,p.bottom,30,400);

    if(bird.x<p.x+30 && bird.x+20>p.x &&
       (bird.y<p.top||bird.y+20>p.bottom)){
      run=false;
    }
  });

  requestAnimationFrame(loop);
}

document.addEventListener("click",()=>{if(run)bird.v=-8});

/* MARY */
const mary=document.getElementById("mary");

function speak(t){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

function reply(input){
  if(input.includes("1+1")) return "It's two...";
  if(input.includes("hi")) return "Hey.";
  return "Try asking something better.";
}

const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")){
    mary.style.display="block";
    speak("Yeah?");
  }else{
    speak(reply(text));
  }
};

rec.start();

</script>

</body>
</html>
<script src="upgrade.js"></script>
