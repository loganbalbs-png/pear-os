<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear Phone</title>

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  font-family:sans-serif;
}

.phone {
  width:320px;
  height:580px;
  border-radius:60px;
  background: radial-gradient(circle,#1a5cff,#000);
  padding:15px;
  position:relative;
  overflow:hidden;
}

.grid { text-align:center; }

.app {
  display:inline-block;
  margin:8px;
  color:white;
  font-size:12px;
}

.icon {
  width:60px;
  height:60px;
  border-radius:50%;
  background-size:cover;
  box-shadow:0 6px 12px rgba(0,0,0,0.8);
}

/* ICONS */
.cam { background:url('https://cdn-icons-png.flaticon.com/512/2920/2920222.png') center/cover; }
.photos { background:url('https://cdn-icons-png.flaticon.com/512/149/149852.png') center/cover; }
.browser { background:url('https://cdn-icons-png.flaticon.com/512/888/888879.png') center/cover; }
.store { background:url('https://cdn-icons-png.flaticon.com/512/731/731985.png') center/cover; }

.screen { display:none; position:absolute; width:100%; height:100%; }
.active { display:block; }

.exit {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  padding:5px;
}

video, canvas { width:100%; }

.gallery img {
  width:80px;
  margin:5px;
}
</style>
</head>

<body>

<div class="phone">

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid" id="apps">

<div class="app">
  <div class="icon cam" onclick="openApp('camera')"></div>
  Camera
</div>

<div class="app">
  <div class="icon photos" onclick="openApp('photos')"></div>
  Photos
</div>

<div class="app">
  <div class="icon browser" onclick="openBrowser()"></div>
  Browser
</div>

<div class="app">
  <div class="icon store" onclick="openApp('store')"></div>
  App Store
</div>

</div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div id="gallery" class="gallery"></div>
</div>

<!-- STORE -->
<div id="store" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<button onclick="installFlappy()">Install Flappy Bird</button>
</div>

<!-- FLAPPY BIRD -->
<div id="flappy" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<canvas id="game" width="300" height="400"></canvas>
</div>

</div>

<script>

/* NAV */
function openApp(app){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(app).classList.add('active');

  if(app==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>cam.srcObject=stream);
  }

  if(app==="photos") loadPhotos();
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* CAMERA */
function takePhoto(){
  canvas.width=cam.videoWidth;
  canvas.height=cam.videoHeight;
  canvas.getContext("2d").drawImage(cam,0,0);

  let data=canvas.toDataURL();
  let photos=JSON.parse(localStorage.getItem("photos")||"[]");
  photos.push(data);
  localStorage.setItem("photos",JSON.stringify(photos));
}

/* PHOTOS */
function loadPhotos(){
  gallery.innerHTML="";
  let photos=JSON.parse(localStorage.getItem("photos")||"[]");
  photos.forEach(p=>{
    let img=document.createElement("img");
    img.src=p;
    gallery.appendChild(img);
  });
}

/* BROWSER */
function openBrowser(){
  window.open("https://www.google.com","_blank");
}

/* INSTALL FLAPPY */
function installFlappy(){
  let app=document.createElement("div");
  app.className="app";
  app.innerHTML=`
    <div class="icon" style="background:url('https://cdn-icons-png.flaticon.com/512/616/616494.png') center/cover;"
    onclick="openApp('flappy'); startGame();"></div>
    Flappy
  `;
  document.getElementById("apps").appendChild(app);
}

/* ===== FLAPPY BIRD ===== */

let canvasGame = document.getElementById("game");
let ctx = canvasGame.getContext("2d");

let bird, pipes, score, running;

/* START */
function startGame(){
  bird = { x:50, y:150, v:0 };
  pipes = [];
  score = 0;
  running = true;
  spawnPipe();
  loop();
}

/* PIPE */
function spawnPipe(){
  let gap = 120;
  let top = Math.random()*200+20;

  pipes.push({ x:300, top:top, bottom:top+gap });

  if(running) setTimeout(spawnPipe,1500);
}

/* LOOP */
function loop(){
  if(!running) return;

  ctx.clearRect(0,0,300,400);

  bird.v += 0.5;
  bird.y += bird.v;

  ctx.fillStyle="yellow";
  ctx.fillRect(bird.x,bird.y,20,20);

  ctx.fillStyle="green";

  pipes.forEach(p=>{
    p.x -= 2;

    ctx.fillRect(p.x,0,30,p.top);
    ctx.fillRect(p.x,p.bottom,30,400);

    if(
      bird.x < p.x+30 &&
      bird.x+20 > p.x &&
      (bird.y < p.top || bird.y+20 > p.bottom)
    ){
      gameOver();
    }

    if(p.x === 50) score++;
  });

  if(bird.y>380 || bird.y<0) gameOver();

  ctx.fillStyle="white";
  ctx.fillText("Score: "+score,10,20);

  requestAnimationFrame(loop);
}

/* JUMP */
document.addEventListener("click",()=>{
  if(running) bird.v = -8;
});

/* GAME OVER */
function gameOver(){
  running=false;
  ctx.fillStyle="red";
  ctx.font="30px Arial";
  ctx.fillText("Game Over",70,200);

  setTimeout(startGame,1500);
}

</script>

</body>
</html>
