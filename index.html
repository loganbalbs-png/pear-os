<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.phone{
  width:320px;
  height:600px;
  border-radius:60px;
  background:#0b2c6b;
  position:relative;
  overflow:hidden;
  color:white;
}

/* BUBBLES (triangle) */
.topbar{position:absolute;top:10px;width:100%;height:80px;}
.bubble{
  width:55px;height:55px;border-radius:50%;
  background:#111;display:flex;align-items:center;justify-content:center;
  position:absolute;font-size:12px;
}
.bubble:nth-child(1){left:20px;}
.bubble:nth-child(2){right:20px;}
.bubble:nth-child(3){left:50%;transform:translateX(-50%);top:35px;}

/* SCREENS */
.screen{display:none;position:absolute;width:100%;height:100%;}
.active{display:block;}

.grid{text-align:center;margin-top:100px;}
.app{display:inline-block;margin:10px;font-size:11px;}

.icon{
  width:65px;height:65px;border-radius:50%;
  background:#444;display:flex;align-items:center;justify-content:center;
  font-size:24px;
}

.exit{position:absolute;top:10px;right:10px;background:red;padding:5px;}

/* MARY */
#mary{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:70px;height:70px;
  border-radius:50%;
  background:orange;
  display:none;
}

/* CANVAS */
canvas{position:absolute;top:0;left:0;}
video{width:100%;}
</style>
</head>

<body>

<div class="phone">

<!-- BUBBLES -->
<div class="topbar">
  <div class="bubble" id="time"></div>
  <div class="bubble">🌤</div>
  <div class="bubble">⚙</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid">

<div class="app"><div class="icon" onclick="openApp('camera')">📷</div>Camera</div>
<div class="app"><div class="icon" onclick="openApp('browser')">🌐</div>Browser</div>
<div class="app"><div class="icon" onclick="openApp('calc')">🧮</div>Calc</div>
<div class="app"><div class="icon" onclick="openApp('finger')">✋</div>Finger</div>

</div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="cam" autoplay></video>
</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<input id="search">
<button onclick="frame.src='https://bing.com/search?q='+search.value">Go</button>
<iframe id="frame" style="width:100%;height:80%"></iframe>
</div>

<!-- CALC -->
<div id="calc" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<input id="calcInput">
<button onclick="calcInput.value=eval(calcInput.value)">=</button>
</div>

<!-- FINGER FOLLOWER -->
<div id="finger" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<video id="fingerCam" autoplay></video>
<canvas id="fingerCanvas"></canvas>
</div>

<div id="mary"></div>

</div>

<script>

/* TIME */
setInterval(()=>time.innerText=new Date().toLocaleTimeString(),1000);

/* NAV */
function openApp(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==="camera"){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>cam.srcObject=stream);
  }

  if(id==="finger"){
    startFinger();
  }
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  home.classList.add('active');
}

/* ===== FINGER FOLLOWER ===== */
let fingerPoints=[];
let fCanvas=document.getElementById("fingerCanvas");
let fCtx=fCanvas.getContext("2d");

function startFinger(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>fingerCam.srcObject=stream);

  fCanvas.width=320;
  fCanvas.height=400;
  fingerPoints=[];
  drawFinger();
}

function drawFinger(){
  fCtx.clearRect(0,0,fCanvas.width,fCanvas.height);

  if(fingerPoints.length>1){
    fCtx.beginPath();
    fCtx.moveTo(fingerPoints[0].x,fingerPoints[0].y);
    for(let i=1;i<fingerPoints.length;i++){
      fCtx.lineTo(fingerPoints[i].x,fingerPoints[i].y);
    }
    fCtx.strokeStyle="lime";
    fCtx.lineWidth=3;
    fCtx.stroke();
  }

  fingerPoints.forEach(p=>{
    fCtx.beginPath();
    fCtx.arc(p.x,p.y,5,0,Math.PI*2);
    fCtx.fillStyle="yellow";
    fCtx.fill();
  });

  requestAnimationFrame(drawFinger);
}

fCanvas.addEventListener("click",(e)=>{
  let rect=fCanvas.getBoundingClientRect();
  fingerPoints.push({
    x:e.clientX-rect.left,
    y:e.clientY-rect.top
  });
});

/* ===== MARY ===== */
let state=null;

function speak(t){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

function reply(input){
  input=input.toLowerCase();

  if(input.includes("weather")){
    return "Stick your head out the window.";
  }

  if(input.includes("play my jam")){
    state="jam";
    return "Which one, one or two?";
  }

  if(state==="jam"){
    state=null;

    if(input.includes("one")){
      new Audio("https://www.myinstants.com/media/sounds/icarly-theme-song.mp3").play();
      return "Playing jam one.";
    }

    if(input.includes("two")){
      new Audio("https://www.myinstants.com/media/sounds/victorious-theme-song.mp3").play();
      return "Playing jam two.";
    }
  }

  if(input.includes("hello")){
    return "What do you want?";
  }

  return "Try again.";
}

/* VOICE */
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.continuous=true;

rec.onresult=e=>{
  let text=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(text.includes("hey mary")){
    mary.style.display="block";
    speak("Yeah?");
  }else{
    speak(reply(text));
  }
};

rec.start();

</script>

</body>
</html>
<script src="upgrade.js"></script>
