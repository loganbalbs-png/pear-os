<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pear OS</title>

<style>
body {
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  font-family:Arial;
}

/* PHONE */
.phone {
  width:320px;
  height:568px;
  border-radius:60px;
  margin-top:20px;
  background: radial-gradient(circle at center,#3aa0ff,#000);
  padding:15px;
  position:relative;
  overflow:hidden;
}

/* SCREENS */
.screen {
  position:absolute;
  width:100%;
  height:100%;
  display:none;
}
.active { display:block; }

/* ICON STYLE (MATCHES PEAR LOOK) */
.icon {
  width:62px;
  height:62px;
  border-radius:50%;
  display:inline-flex;
  justify-content:center;
  align-items:center;
  margin:8px;
  font-size:22px;
  color:white;
  position:relative;

  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(0,0,0,0.3));
  box-shadow:
    inset 0 6px 10px rgba(255,255,255,0.6),
    inset 0 -6px 10px rgba(0,0,0,0.7),
    0 6px 14px rgba(0,0,0,0.9);
}

.icon::after {
  content:"";
  position:absolute;
  top:6px;
  left:10px;
  width:70%;
  height:30%;
  background:rgba(255,255,255,0.6);
  border-radius:50%;
}

/* COLORS */
.messages { background:linear-gradient(#6eff8a,#1fae4b);}
.camera { background:linear-gradient(#666,#111);}
.photos { background:linear-gradient(#ff4f7a,#ff1a4d);}
.browser { background:linear-gradient(#4da6ff,#003cff);}
.notes { background:linear-gradient(#fff799,#ffd400); color:black;}
.music { background:linear-gradient(#1ed760,#0a7d3b);}
.clock { background:linear-gradient(#fff,#ccc); color:black;}
.settings { background:linear-gradient(#aaa,#444);}

/* GRID */
.grid { text-align:center; }

/* EXIT */
.exit {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  padding:5px 10px;
  border-radius:10px;
}

/* TOPBAR */
.topbar {
  background:#007aff;
  color:white;
  text-align:center;
  padding:10px;
}

/* CAMERA */
video, canvas {
  width:100%;
}

/* PHOTOS */
.gallery img {
  width:90px;
  margin:5px;
  border-radius:10px;
}

/* INPUT */
input, textarea {
  width:90%;
  margin:10px;
  padding:10px;
}

iframe {
  width:100%;
  height:80%;
  border:none;
}
</style>
</head>

<body>

<div class="phone">

<!-- HOME -->
<div id="home" class="screen active">
<div class="grid">
<div class="icon messages" onclick="openApp('messages')">💬</div>
<div class="icon camera" onclick="openApp('camera')">📷</div>
<div class="icon photos" onclick="openApp('photos')">🌸</div>

<div class="icon browser" onclick="openApp('browser')">🌐</div>
<div class="icon notes" onclick="openApp('notes')">📝</div>
<div class="icon music" onclick="openSpotify()">🎵</div>

<div class="icon clock" onclick="openApp('clock')">🕒</div>
<div class="icon settings" onclick="openApp('settings')">⚙️</div>
</div>
</div>

<!-- MESSAGES -->
<div id="messages" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Messages</div>
<div id="chat"></div>
<input id="msgInput">
<button onclick="sendMessage()">Send</button>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Camera</div>
<video id="cam" autoplay></video>
<button onclick="takePhoto()">📸</button>
<canvas id="canvas"></canvas>
</div>

<!-- PHOTOS -->
<div id="photos" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Photos</div>
<div id="gallery" class="gallery"></div>
</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Browser</div>
<iframe src="https://example.com"></iframe>
</div>

<!-- NOTES -->
<div id="notes" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Notes</div>
<textarea id="note"></textarea>
<button onclick="saveNote()">Save</button>
</div>

<!-- CLOCK -->
<div id="clock" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Clock</div>
<h1 id="time"></h1>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
<div class="exit" onclick="goHome()">Exit</div>
<div class="topbar">Settings</div>
<p> Pear OS ⚙️ </p>
</div>

</div>

<script>
function openApp(app){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(app).classList.add('active');

if(app==="camera"){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{document.getElementById("cam").srcObject=stream;});
}

if(app==="photos"){loadPhotos();}
}

function goHome(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById("home").classList.add('active');
}

function sendMessage(){
let input=document.getElementById("msgInput");
let chat=document.getElementById("chat");
let msg=document.createElement("div");
msg.innerText=input.value;
chat.appendChild(msg);
input.value="";
}

function saveNote(){
localStorage.setItem("note",document.getElementById("note").value);
}

document.getElementById("note").value=localStorage.getItem("note")||"";

function openSpotify(){
window.location.href="https://open.spotify.com";
}

/* CAMERA → PHOTO SAVE */
function takePhoto(){
let video=document.getElementById("cam");
let canvas=document.getElementById("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

let data=canvas.toDataURL("image/png");
let photos=JSON.parse(localStorage.getItem("photos")||"[]");
photos.push(data);
localStorage.setItem("photos",JSON.stringify(photos));
}

/* LOAD PHOTOS */
function loadPhotos(){
let gallery=document.getElementById("gallery");
gallery.innerHTML="";
let photos=JSON.parse(localStorage.getItem("photos")||"[]");
photos.forEach(p=>{
let img=document.createElement("img");
img.src=p;
gallery.appendChild(img);
});
}

/* CLOCK */
setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
